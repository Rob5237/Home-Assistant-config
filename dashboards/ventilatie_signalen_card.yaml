# Dashboard-kaart voor de vijf ventilatie-signalen (ventileren, sluit ramen,
# houd ramen en tuindeuren dicht, regen, nachtventilatie). Storage-mode dashboards worden
# niet automatisch uit dit bestand geladen; plak deze YAML in een dashboard
# via ⋮ menu → Edit dashboard → +Add card → onderaan "Manual" → paste. Dit
# bestand dient als git-bewaarde referentie.

type: vertical-stack
cards:
  - type: markdown
    title: Ventilatie-signalen
    content: |
      {% set kamer = states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) %}
      {% set buiten = state_attr('weather.thuis', 'temperature') | float(-999) %}
      {% set weer = states('weather.thuis') %}
      {% set ok = kamer > -900 and buiten > -900 %}
      {% set vakantie = is_state('input_boolean.vakantie_actief', 'on') %}
      {% set regen = weer in ['rainy','pouring','lightning-rainy','snowy-rainy','hail'] %}
      {% set stil_venster = now().hour >= 23 or now().hour < 7 or (now().hour == 22 and now().minute >= 30) or (now().hour == 7 and now().minute < 30) %}
      {% set in_nacht = (now().hour == 22 and now().minute >= 30) or now().hour >= 23 or now().hour < 6 %}
      {% set s_ventileren = ok and kamer >= 20 and buiten < kamer and not vakantie and not regen %}
      {% set s_sluit = ok and kamer <= 20 and buiten <= 20 and not vakantie and not regen %}
      {% set s_houd_dicht = ok and kamer > 20 and buiten > kamer and not vakantie and not regen %}
      {% set s_regen = regen and not vakantie %}
      {% set s_nachtvent = ok and kamer > 20 and buiten < 18 and in_nacht and not vakantie and not regen %}
      {% set kamer_str = ('%.1f' % kamer) + ' °C' %}
      {% set buiten_str = ('%.1f' % buiten) + ' °C' %}
      {% set kamer_bg = '#e53935' if kamer > buiten else '' %}
      {% set buiten_bg = '#e53935' if buiten > kamer else '' %}
      {% set kamer_icon = '🟥' if kamer > buiten else '' %}
      {% set buiten_icon = '🟥' if buiten > kamer else '' %}
      {% set kamer_open = ('<span style="background-color:' + kamer_bg + ';color:#fff;padding:2px 6px;border-radius:3px">') if kamer_bg else '' %}
      {% set kamer_close = '</span>' if kamer_bg else '' %}
      {% set buiten_open = ('<span style="background-color:' + buiten_bg + ';color:#fff;padding:2px 6px;border-radius:3px">') if buiten_bg else '' %}
      {% set buiten_close = '</span>' if buiten_bg else '' %}
      {% set weer_nl = {'sunny':'Zonnig','clear-night':'Heldere nacht','cloudy':'Bewolkt','partlycloudy':'Half bewolkt','rainy':'Regen','pouring':'Zware regen','lightning':'Onweer','lightning-rainy':'Onweer met regen','snowy':'Sneeuw','snowy-rainy':'Sneeuw met regen','windy':'Winderig','windy-variant':'Winderig','fog':'Mist','hail':'Hagel','exceptional':'Uitzonderlijk'}.get(weer, weer) %}
      {% set weer_icon = {'sunny':'☀️','clear-night':'🌙','cloudy':'☁️','partlycloudy':'⛅','rainy':'🌧️','pouring':'🌧️','lightning':'⚡','lightning-rainy':'⛈️','snowy':'❄️','snowy-rainy':'🌨️','windy':'💨','windy-variant':'💨','fog':'🌫️','hail':'🌨️','exceptional':'⚠️'}.get(weer, '') %}
      {% if vakantie %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🏝 Vakantiemodus actief</h3>
      <div style="margin:0;line-height:1.2">Alle ventilatie-signalen onderdrukt.</div>
      {% elif s_regen %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🌧 Sluit ramen — het regent</h3>
      <div style="margin:0;line-height:1.2">Sluit ramen en deuren; het regent buiten.</div>
      {% elif s_nachtvent %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🌙 Nachtventilatie: zet ramen open</h3>
      <div style="margin:0;line-height:1.2">Zet ramen wagenwijd open voor het slapengaan; buitenlucht is koel.</div>
      {% elif s_ventileren %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🌡 Ventileren om binnenshuis af te koelen</h3>
      <div style="margin:0;line-height:1.2">Zet ramen en tuindeuren open.</div>
      {% elif s_sluit %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🌡 Sluit ramen om afkoeling te beperken</h3>
      <div style="margin:0;line-height:1.2">Sluit ramen en buitendeuren.</div>
      {% elif s_houd_dicht %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">🌡 Houd ramen en tuindeuren dicht</h3>
      <div style="margin:0;line-height:1.2">Houd ramen en tuindeuren dicht om het huis niet op te warmen.</div>
      {% else %}
      <h3 style="font-size:1.1em;margin:0;line-height:1.1">Geen actief signaal</h3>
      {% endif %}

      <div style="height:0.8em;line-height:0.8em">&nbsp;</div>
      <table style="border-collapse:collapse;border-color:var(--card-background-color)">
      <tr><td align="right" style="border-color:var(--card-background-color);padding:2px 12px 2px 0"><b>{{ kamer_icon }} Kamertemperatuur:</b></td><td style="border-color:var(--card-background-color);padding:2px 0">{{ kamer_open }}<b>{{ kamer_str }}</b>{{ kamer_close }}</td></tr>
      <tr><td align="right" style="border-color:var(--card-background-color);padding:2px 12px 2px 0"><b>{{ buiten_icon }} Buitentemperatuur:</b></td><td style="border-color:var(--card-background-color);padding:2px 0">{{ buiten_open }}<b>{{ buiten_str }}</b>{{ buiten_close }}</td></tr>
      <tr><td align="right" style="border-color:var(--card-background-color);padding:2px 12px 2px 0"><b>Weer:</b></td><td style="border-color:var(--card-background-color);padding:2px 0">{{ weer_icon }} {{ weer_nl }}</td></tr>
      </table>
      {% if stil_venster and not vakantie %}
      🔇 _Stil-venster 22:30-07:30: meldingen komen door zonder wek-geluid._
      {% endif %}
