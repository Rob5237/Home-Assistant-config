# Dashboard-kaart voor de vijf ventilatie-signalen (ventileren, sluit ramen,
# houd ramen en tuindeuren dicht, regen, nachtventilatie). Storage-mode dashboards worden
# niet automatisch uit dit bestand geladen; plak deze YAML in een dashboard
# via ⋮ menu → Edit dashboard → +Add card → onderaan "Manual" → paste. Dit
# bestand dient als git-bewaarde referentie.

type: vertical-stack
cards:
  - type: markdown
    title: Ventilatie-signalen
    content: |
      {% set kamer = states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) %}
      {% set buiten = state_attr('weather.thuis', 'temperature') | float(-999) %}
      {% set weer = states('weather.thuis') %}
      {% set ok = kamer > -900 and buiten > -900 %}
      {% set vakantie = is_state('input_boolean.vakantie_actief', 'on') %}
      {% set regen = weer in ['rainy','pouring','lightning-rainy','snowy-rainy','hail'] %}
      {% set stil_venster = now().hour >= 23 or now().hour < 7 or (now().hour == 22 and now().minute >= 30) or (now().hour == 7 and now().minute < 30) %}
      {% set in_nacht = (now().hour == 22 and now().minute >= 30) or now().hour >= 23 or now().hour < 6 %}
      {% set s_ventileren = ok and kamer >= 20 and buiten < kamer and not vakantie and not regen %}
      {% set s_sluit = ok and kamer <= 20 and buiten <= 20 and not vakantie and not regen %}
      {% set s_houd_dicht = ok and kamer > 20 and buiten > kamer and not vakantie and not regen %}
      {% set s_regen = regen and not vakantie %}
      {% set s_nachtvent = ok and kamer > 20 and buiten < 18 and in_nacht and not vakantie and not regen %}
      {% set kamer_str = ('%.1f' % kamer) + ' °C' %}
      {% set buiten_str = ('%.1f' % buiten) + ' °C' %}
      {% set kamer_color = '#e53935' if kamer > buiten else ('#1976d2' if kamer < buiten else '') %}
      {% set buiten_color = '#e53935' if buiten > kamer else ('#1976d2' if buiten < kamer else '') %}
      {% set kamer_html = ('<span style="color:' + kamer_color + '"><b>Kamer:</b> <b>' + kamer_str + '</b></span>') if kamer_color else ('<b>Kamer:</b> ' + kamer_str) %}
      {% set buiten_html = ('<span style="color:' + buiten_color + '"><b>Buiten:</b> <b>' + buiten_str + '</b></span>') if buiten_color else ('<b>Buiten:</b> ' + buiten_str) %}
      {{ kamer_html }}  ·  {{ buiten_html }}  ·  **Weer:** {{ weer }}
      {% if vakantie %}
      🏝 _Vakantiemodus actief — alle ventilatie-signalen onderdrukt._
      {% elif s_regen %}
      🌧 **Sluit ramen — het regent**
      Sluit ramen en deuren; het regent buiten.
      {% elif s_nachtvent %}
      🌙 **Nachtventilatie: zet ramen open**
      Zet ramen wagenwijd open voor het slapengaan; buitenlucht is koel.
      {% elif s_ventileren %}
      🌡 **Ventileren om binnenshuis af te koelen**
      Zet ramen en tuindeuren open.
      {% elif s_sluit %}
      🌡 **Sluit ramen om afkoeling te beperken**
      Sluit ramen en buitendeuren.
      {% elif s_houd_dicht %}
      🌡 **Houd ramen en tuindeuren dicht**
      Houd ramen en tuindeuren dicht om het huis niet op te warmen.
      {% else %}
      _Geen actief signaal._
      {% endif %}
      {% if stil_venster and not vakantie %}
      🔇 _Stil-venster 22:30-07:30: meldingen komen door zonder wek-geluid._
      {% endif %}

  - type: entities
    show_header_toggle: false
    entities:
      - entity: automation.signaal_kamertemp_buitentemp_actueel
        name: Ventileren-signaal
        secondary_info: last-triggered
      - entity: input_boolean.ventileren_signaal_actief
        name: — reeds verstuurd (marker)
      - type: divider
      - entity: automation.signaal_sluit_ramen_kamer_20degc_en_buiten_20degc_actueel
        name: Sluit-ramen-signaal
        secondary_info: last-triggered
      - entity: input_boolean.sluit_ramen_signaal_actief
        name: — reeds verstuurd (marker)
      - type: divider
      - entity: automation.signaal_houd_ramen_dicht_kamer_20degc_en_buiten_kamer_actueel
        name: Houd-ramen-en-tuindeuren-dicht-signaal
        secondary_info: last-triggered
      - entity: input_boolean.ramen_dicht_signaal_actief
        name: — reeds verstuurd (marker)
      - type: divider
      - entity: automation.signaal_sluit_ramen_het_regent_actueel
        name: Regen-signaal
        secondary_info: last-triggered
      - entity: input_boolean.regen_signaal_actief
        name: — reeds verstuurd (marker)
      - type: divider
      - entity: automation.signaal_nachtventilatie_kamer_22degc_en_buiten_18degc_22_00_06_00
        name: Nachtventilatie-signaal
        secondary_info: last-triggered
      - entity: input_boolean.nachtventilatie_signaal_actief
        name: — reeds verstuurd (marker)
