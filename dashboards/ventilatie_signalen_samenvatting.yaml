type: markdown
title: Ventilatie-signalen — samenvatting
content: |
  {% set kamer = states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) %}
  {% set buiten = state_attr('weather.thuis', 'temperature') | float(-999) %}
  {% set weer = states('weather.thuis') %}
  {% set ok = kamer > -900 and buiten > -900 %}
  {% set vakantie = is_state('input_boolean.vakantie_actief', 'on') %}
  {% set regen = weer in ['rainy','pouring','lightning-rainy','snowy-rainy','hail'] %}
  {% set stil_venster = now().hour >= 23 or now().hour < 7 or (now().hour == 22 and now().minute >= 30) or (now().hour == 7 and now().minute < 30) %}
  {% set in_nacht = (now().hour == 22 and now().minute >= 30) or now().hour >= 23 or now().hour < 6 %}
  {% set c_v = ok and kamer >= 20 and buiten < kamer %}
  {% set c_s = ok and kamer <= 20 and buiten <= 20 %}
  {% set c_h = ok and kamer > 20 and buiten > kamer %}
  {% set c_r = regen %}
  {% set c_n = ok and kamer > 20 and buiten < 18 and in_nacht %}
  {% set f_v = c_v and not vakantie and not regen %}
  {% set f_s = c_s and not vakantie and not regen %}
  {% set f_h = c_h and not vakantie and not regen %}
  {% set f_r = c_r and not vakantie %}
  {% set f_n = c_n and not vakantie and not regen %}
  {% set actief = 'Regen' if f_r else 'Nachtventilatie' if f_n else 'Ventileren' if f_v else 'Sluit ramen' if f_s else 'Houd dicht' if f_h else '—' %}
  **Live:** kamer **{{ '%.1f'|format(kamer) }} °C**  ·  buiten **{{ '%.1f'|format(buiten) }} °C**  ·  weer **{{ weer }}**

  **Guards nu:**
  {{ '🏝' if vakantie else '·' }} vakantie  ·  {{ '🔇' if stil_venster else '·' }} stil-venster 22:30–07:30 (geluid uit)  ·  {{ '🌧' if regen else '·' }} regen

  **Signalen:**  (○ = conditie niet waar · ✓ = activeert nu · ✗ = conditie waar maar onderdrukt door guard)

  | # | Signaal | Conditie | Status |
  |---|---|---|---|
  | 1 | 🌡 Ventileren | kamer ≥20 & buiten<kamer | {{ '✓' if f_v else ('✗' if c_v else '○') }} |
  | 2 | 🌡 Sluit ramen | kamer ≤20 & buiten ≤20 | {{ '✓' if f_s else ('✗' if c_s else '○') }} |
  | 3 | 🌡 Houd dicht | kamer >20 & buiten>kamer | {{ '✓' if f_h else ('✗' if c_h else '○') }} |
  | 4 | 🌧 Regen | rainy / pouring / hail | {{ '✓' if f_r else ('✗' if c_r else '○') }} |
  | 5 | 🌙 Nachtvent | kamer >20 & buiten <18 & 22:30–06:00 | {{ '✓' if f_n else ('✗' if c_n else '○') }} |

  **Actief signaal:** {{ actief }}
