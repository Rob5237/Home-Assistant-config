- id: warmtepomp_goedkoop_uur_opwarmen
  alias: "Warmtepomp: extra opwarmen bij goedkoopste uur"
  description: >
    Zet heating_target_correction tijdelijk op +0.5°C op het optimale stookuur.
    Het tijdswindow is groter bij koud weer (meer thermische opslag nodig) en
    kleiner bij mild weer. Formule: clamp(60min…180min, raw×2×30) waarbij
    raw = 1 + 2×(14−t)/24. Alleen actief als kamertemperatuur onder het
    Luxtronik setpoint ligt.
    Trigger op minutes:'1' (i.p.v. elke minuut) geeft de optimaal-startuur
    sensor tijd om te verversen op het hele uur.
  triggers:
    - trigger: time_pattern
      minutes: '1'
  conditions:
    - condition: template
      value_template: >
        {% set opt = states('sensor.warmtepomp_optimaal_startuur') %}
        {{ opt not in ('unknown', 'unavailable', 'onbekend')
           and opt | length >= 2
           and now().hour == opt[:2] | int(-1) }}
    - condition: not
      conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_heating_mode
          state: "Off"
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    - condition: template
      value_template: >
        {% set t_kamer = states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(none) %}
        {% set t_setpoint = states('sensor.luxtronik_280807_0450_room_thermostat_temperature_target') | float(none) %}
        {{ t_kamer is not none and t_setpoint is not none and t_kamer < t_setpoint }}
  actions:
    - variables:
        t_buiten: >
          {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(10) }}
        window_min: >
          {% set t = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(10) %}
          {% set raw = 1 + 2 * (14 - t) / 24 %}
          {{ [[60, (raw * 2) | round | int * 30] | max, 180] | min }}
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0.5
    - delay:
        minutes: "{{ window_min }}"
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0
  mode: single

- id: warmtepomp_correction_reset_op_start
  alias: "Warmtepomp: reset correction bij HA-start"
  description: >
    Bij HA-start: als heating_target_correction nog op een waarde ≠ 0 staat,
    reset naar 0. Voorkomt dat correctie blijft hangen wanneer HA herstart
    tijdens de delay-fase van warmtepomp_goedkoop_uur_opwarmen (mode: single).
  triggers:
    - trigger: homeassistant
      event: start
  conditions:
    - condition: template
      value_template: >
        {{ states('number.luxtronik_280807_0450_heating_target_correction') | float(0) != 0 }}
  actions:
    # Wacht op Luxtronik-entiteiten die na HA-start nog niet altijd direct beschikbaar zijn.
    - delay:
        seconds: 30
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0
  mode: single

- id: waarschuwing_bij_herinstallatie
  alias: Waarschuwing bij herinstallatie
  triggers:
  - trigger: event
    event_type: home_assistant_start
  actions:
  - action: persistent_notification.create
    data:
      title: Let op!
      message: 'Je staat op het punt Home Assistant te herstarten of te herinstalleren.
        De map /share kan worden overschreven, met submappen /Documenten, /Afbeeldingen
        en /Downloads. Maak eerst een back-up!

        '
  mode: single
- id: tapwater_zonne_overschot_klein
  alias: Warmwater bij Zonne-overschot
  description: >
    Verwarm boiler met WP bij teruglevering >= 2000W EN voldoende zon-forecast
    voor het komende uur (>= 2.0 kWh, som van alle 3 dakgedeeltes via
    forecast_solar). Dit voorkomt dat een cyclus halverwege uit het net gaat
    trekken als de zon onverwacht zakt.
    Setpoint 62°C + dhw_mode Party (ipv 57°C Automatic) geeft een lange cyclus
    (49→62 = 13K) ipv korte 8K-cycli die pendel-gedrag veroorzaken zolang
    P1<-1500 blijft (reset van bijverwarmen firet dan niet). Reset volgt via
    `zonne_overschot_extra_opslag_reset` (DHW > 58°C + mode Party).
  triggers:
  - entity_id:
    - sensor.p1_meter_power
    below: -2000
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 52
  - condition: state
    entity_id: binary_sensor.zon_forecast_volgend_uur_voldoende
    state: "on"
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 62
    action: number.set_value
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Party
    action: select.select_option
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: tapwater_extra_opslag_groot_overschot
  alias: Tapwater extra opslag bij groot zonne-overschot
  description: >
    Bij groot teruglevering (P1 < -4000W voor 10 min) en boiler al in
    zonne-overschot boost-modus (setpoint 55-60°C), verhoog setpoint naar
    62°C voor extra opslag. DHW-mode tijdelijk op "Party" om de hysterese
    (8K) te overrulen — anders zou de WP niet opnieuw starten bij DHW>54.
    Reset volgt via zonne_overschot_extra_opslag_reset bij DHW > 58°C
    (zet setpoint→48 en mode→Automatic, of →Holidays tijdens vakantie).
    Veiligheidsreset (interne delay 90 min): als de reguliere reset niet is
    gevuurd binnen 90 min (bv. omdat user via display dhw_mode handmatig
    heeft gewijzigd zodat de Party-conditie in de reset-automation faalt),
    forceer dan alsnog setpoint→48 + mode→Automatic. Voorkomt achtergebleven
    setpoint 62°C waardoor bij volgend waterverbruik een ongewenste 62°C-
    oplaadcyclus zou starten. Mode: single blokkeert in deze 90 min nieuwe
    boost-starts, wat acceptabel is (geen dubbele boost gewenst).
  triggers:
  - entity_id: sensor.p1_meter_power
    below: -4000
    for:
      minutes: 10
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 55
    below: 60
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 61
  - condition: state
    entity_id: binary_sensor.zon_forecast_volgend_uur_voldoende
    state: "on"
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 62
    action: number.set_value
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Party
    action: select.select_option
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  - delay:
      minutes: 90
  # Veiligheidsreset: setpoint nog steeds > 55 betekent reguliere reset
  # heeft niet gevuurd (bv. user heeft Party-mode handmatig gewijzigd).
  - if:
    - condition: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      above: 55
    then:
    - target:
        entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      data:
        value: 48
      action: number.set_value
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_dhw_mode
        state: Party
      then:
      - target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: >-
            {% if is_state('input_boolean.vakantie_actief', 'on')
                  and is_state('input_boolean.tapwater_overschot_lock', 'on') %}Holidays{% else %}Automatic{% endif %}
        action: select.select_option
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Zonne-overschot boost: veiligheidsreset"
        notification_id: extra_opslag_safety_reset
        message: >-
          Reguliere reset op DHW>58°C heeft niet gevuurd binnen 90 min na
          start van groot-overschot boost. Setpoint geforceerd naar 48°C.
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Mode {{ states('select.luxtronik_280807_0450_dhw_mode') }}.
  mode: single
- id: tdi_legionella_solar_overschot
  alias: Legionella TDI bij laagste tarief overdag
  description: 'Elk heel uur overdag (09:00-16:00) wordt gecheckt of dit het goedkoopste
    resterende uur is op basis van Zonneplan tarieven. Klokprogramma 09:30-16:00
    (buiten >= 15°C) of 12:00-16:00 (buiten < 15°C).'
  triggers:
  - trigger: time_pattern
    minutes: '0'
  conditions:
  - condition: time
    after: '09:00:00'
    before: '16:00:00'
  - condition: template
    value_template: >
      {% set last = states('input_datetime.tdi_laatste_start') %}
      {{ last in ('unknown', 'unavailable') or (now() - as_datetime(last)).days >= 7 }}
  - condition: state
    entity_id: binary_sensor.goedkoopste_tdi_uur_nu
    state: "on"
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.tdi_laatste_start
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  # Schakel Luxtronik's interne wekelijkse TDI-scheduler uit. HA stuurt de
  # TDI-cyclus zelf aan via dhw_target=62°C; we willen voorkomen dat de pomp
  # autonoom om 00:00 op de geconfigureerde dag óók nog een TDI start.
  - target:
      entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
    data:
      option: 'None'
    action: select.select_option
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 62
    action: number.set_value
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    then:
    - target:
        entity_id: switch.luxtronik_280807_0450_heating
      action: switch.turn_on
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  # [DEBUG-MONITOR] Tijdelijk: log TDI-start om reset-gedrag te verifiëren
  # na de 2026-06-08 wijziging (DHW>61 voor 10 min). Verwijder dit blok
  # na 2026-06-15 zodra de eerste cyclus is geobserveerd.
  - action: persistent_notification.create
    data:
      title: "[DEBUG-MONITOR] TDI gestart"
      notification_id: debug_tdi_start
      message: >-
        TDI-cyclus gestart op {{ now().strftime('%Y-%m-%d %H:%M') }}.
        DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
        Buiten {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C |
        Tarief {{ states('sensor.zonneplan_current_electricity_tariff') }}.
        Verwachting: reset firet zodra DHW ≥61°C voor 10 min vastgehouden.
  mode: single
- id: tdi_einde_reset
  alias: TDI einde - reset naar normaalstand
  description: >
    Reset na TDI-cyclus: setpoint terug naar 48°C zodra DHW ≥ 61°C voor 10 min.
    De "voor 10 min" eis borgt Legionella-protocol (afdoding bij ≥60°C vereist
    minimaal 10-11 min houdtijd) — een eenmalig passeren van 60°C door stratificatie
    is onvoldoende. Drempel op 61°C (i.p.v. exact 62°C-setpoint) voorkomt dat
    we eindeloos wachten als de WP bij hoge tank-temperatuur stagneert vlak
    onder setpoint.
    Verwarmingsswitch alleen uit als buitentemp ≥ stookdrempel — anders zou
    ruimteverwarming bij koud weer ten onrechte uitgaan na TDI.
    Onderscheid van zonne-overschot extra opslag (zelfde setpoint 62°C, maar
    Party-mode) via DHW-mode = Automatic.
    Setpoint > 60 voorkomt onbedoelde trigger bij gewone bijverwarm-cycli
    (setpoint 57) waar restwarmte/overshoot DHW boven 60°C kan duwen.
  triggers:
  - id: tdi_klaar
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 61
    for:
      minutes: 10
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: select.luxtronik_280807_0450_dhw_mode
    state: Automatic
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 60
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 48
    action: number.set_value
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "on"
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
    then:
    - target:
        entity_id: select.luxtronik_280807_0450_dhw_mode
      data:
        option: Holidays
      action: select.select_option
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    - condition: template
      value_template: >
        {% set t_buiten = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(none) %}
        {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
        {{ t_buiten is not none and t_buiten >= t_drempel }}
    then:
    - target:
        entity_id: switch.luxtronik_280807_0450_heating
      action: switch.turn_off
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  # [DEBUG-MONITOR] Tijdelijk: log TDI-reset om te bevestigen dat de nieuwe
  # drempel (DHW>61 voor 10 min) correct vuurt. Vergelijk timestamp met
  # debug_tdi_start om de houdtijd boven 60°C te valideren. Verwijder dit
  # blok na 2026-06-15 zodra eerste cyclus is geobserveerd.
  - action: persistent_notification.create
    data:
      title: "[DEBUG-MONITOR] TDI-reset geslaagd"
      notification_id: debug_tdi_reset
      message: >-
        TDI-reset gevuurd op {{ now().strftime('%Y-%m-%d %H:%M') }}.
        DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C bereikt;
        setpoint teruggezet naar 48°C.
        Vergelijk met debug_tdi_start om houdtijd ≥10 min boven 60°C te bevestigen.
  mode: single
- id: zonne_overschot_extra_opslag_reset
  alias: Zonne-overschot extra opslag - reset
  description: >
    Reset zonne-overschot extra opslag (setpoint 62°C, Party-mode): DHW-mode
    terug naar Automatic en setpoint naar 48°C zodra DHW > 58°C. Drempel lager
    dan TDI-reset (60°C) omdat WP bij hoge DHW-temperaturen kan stagneren
    voordat 60°C bereikt wordt; setpoint 62 was alleen bedoeld om hysterese
    te overrulen, niet als hard streefgetal.
  triggers:
  - entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 58
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: select.luxtronik_280807_0450_dhw_mode
    state: Party
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 55
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: >-
        {% if is_state('input_boolean.vakantie_actief', 'on')
              and is_state('input_boolean.tapwater_overschot_lock', 'on') %}Holidays{% else %}Automatic{% endif %}
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 48
    action: number.set_value
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: tapwater_bijverwarmen
  alias: Tapwater bijverwarmen bij lage temperatuur
  description: >
    Verwarm tapwater naar 57°C als het onder 47°C zakt. Blokkeert bij hoog tarief
    (> drempel in input_number.tapwater_tarief_drempel), tenzij noodgeval (< 41°C).
  triggers:
  - entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 47
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.luxtronik_280807_0450_dhw_temperature
      below: 41
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.vakantie_actief
        state: "off"
      - condition: template
        value_template: >
          {% set tarief = states('sensor.zonneplan_current_electricity_tariff') | float(0.30) %}
          {% set drempel = states('input_number.tapwater_tarief_drempel') | float(0.25) %}
          {{ tarief <= drempel }}
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 57
    action: number.set_value
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_reset_na_bijverwarmen
  alias: Tapwater reset naar normaalstand na bijverwarmen
  description: >
    Zet setpoint terug naar 48°C zodra tapwater 57°C bereikt (setpoint bereikt).
    Niet tijdens TDI (setpoint 62°C) en niet bij actief zonne-overschot (dan
    blijven doorladen). 48°C als rust-setpoint voorkomt dat de Luxtronik autonoom
    cycli draait onder 39°C (48 - 9K hysterese).
    Avond-watchdog (22:00): de DHW>57-trigger is een transitie-trigger en kan
    gemist worden als P1<-1500 op moment van stijging (conditie faalt, daarna
    firet de trigger niet meer). Een tweede kans om 22:00 (zon definitief weg,
    P1>0) reset alsnog wanneer lock=on en setpoint nog 50-60.
  triggers:
  - id: dhw_boven_57
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 57
    for:
      minutes: 2
    trigger: numeric_state
  - id: avond_watchdog
    trigger: time
    at: "22:00:00"
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: dhw_boven_57
    - condition: and
      conditions:
      - condition: trigger
        id: avond_watchdog
      - condition: state
        entity_id: input_boolean.tapwater_overschot_lock
        state: "on"
  - condition: template
    value_template: >
      {% set setpoint = state_attr('water_heater.luxtronik_280807_0450_domestic_water',
        'temperature') | float(0) %}
      {% set solar = states('sensor.p1_meter_power') | float(0) %}
      {{ 50 < setpoint < 60 and solar > -1500 }}
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 48
    action: number.set_value
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "on"
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
    then:
    - target:
        entity_id: select.luxtronik_280807_0450_dhw_mode
      data:
        option: Holidays
      action: select.select_option
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_goedkoopste_nachtuur
  alias: Tapwater verwarmen in goedkoopste nachtuur
  description: >
    Elk heel uur tussen 22:00 en 06:00 wordt gecheckt of dit het goedkoopste uur
    in het nachtvenster is (Zonneplan forecast). Als ja en tapwater < 54°C → opwarmen
    naar 57°C. Reset volgt via tapwater_reset_na_bijverwarmen.
  triggers:
  - trigger: time_pattern
    minutes: '0'
  conditions:
  - condition: state
    entity_id: input_boolean.vakantie_actief
    state: "off"
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 54
  - condition: state
    entity_id: binary_sensor.goedkoopste_nachtuur_nu
    state: "on"
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 57
    action: number.set_value
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_overschot_user_intervention
  alias: "Tapwater: lock uitzetten bij handmatige dhw_mode wijziging"
  description: >
    Detecteert handmatige dhw_mode-wijzigingen tijdens een actieve
    opwarm-cyclus (HA UI of Luxtronik-display/RBE). Wanneer de user
    overneemt, wordt de lock uitgezet zodat de bijbehorende reset-
    automation dhw_mode NIET terugzet naar Holidays — de user-intent
    wint.

    Context-detectie:
    • UI-actie → context.user_id is gevuld
    • Luxtronik RBE/integration push → context.parent_id is None
    • Onze eigen automation-actie → context.parent_id is gevuld én
      user_id is None → condition matched niet → lock blijft staan
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_dhw_mode
  conditions:
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
    - condition: template
      value_template: >
        {{ trigger.to_state.context.user_id is not none
           or trigger.to_state.context.parent_id is none }}
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Tapwater: user-overname gedetecteerd"
        notification_id: tapwater_user_intervention
        message: >-
          dhw_mode handmatig gewijzigd naar
          **{{ trigger.to_state.state }}** tijdens actieve opwarm-cyclus.
          Reset-automation zal dhw_mode NIET terugzetten naar Holidays.
  mode: single

- id: vakantie_sync_aan
  alias: "Vakantie: synchroniseer aan"
  description: >
    Activeert input_boolean.vakantie_actief zodra dhw_mode of heating_mode op
    Holidays wordt gezet (Luxtronik-display), of zodra de boolean handmatig
    in HA wordt aangezet.

    Heating gaat NIET op Holidays — die mode hanteert intern een zeer lage
    curve waardoor kamertemp bij koud weer onder 10°C kan zakken. In plaats
    daarvan blijft heating_mode op Automatic en wordt
    heating_curve_parallel_shift_temperature tijdelijk verlaagd naar 15.0°C
    (vakantie-stooklijn). De oorspronkelijke waarde staat in
    input_number.vakantie_parallel_shift_backup (0 = geen backup actief; de
    Luxtronik-range is 5-35°C dus 0 is een veilige sentinel-waarde).

    Circuit-keuze: alleen heating_curve_parallel_shift_temperature wordt
    aangepast (= hoofd-verwarmingscircuit). De circuit1/2/3-shifts blijven
    onaangeroerd omdat de gemengde circuits niet actief gebruikt worden in
    deze installatie (flow_in_circuit1/2/3_target_temperature = 0.0 — de
    Luxtronik regelt enkel het hoofdcircuit). Mocht in de toekomst een
    mixed-circuit aangezet worden, dan ook
    heating_curve_circuit1_parallel_shift_temperature meeschalen.

    Heating_mode wordt teruggezet naar Automatic als die op Holidays stond
    (Luxtronik-display gebruiker). Dhw_mode gaat wel naar Holidays (respecteert
    "Off"). Idempotent: backup wordt alleen gemaakt als die nog 0 is, dus
    herhaalde sync_aan-runs overschrijven de backup niet.
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_dhw_mode
      to: Holidays
    - trigger: state
      entity_id: select.luxtronik_280807_0450_heating_mode
      to: Holidays
    - trigger: state
      entity_id: input_boolean.vakantie_actief
      to: "on"
  actions:
    - if:
      - condition: not
        conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_dhw_mode
          state: "Off"
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Holidays
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_heating_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_heating_mode
        data:
          option: Automatic
    - if:
      - condition: numeric_state
        entity_id: input_number.vakantie_parallel_shift_backup
        below: 0.1
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.vakantie_parallel_shift_backup
        data:
          value: "{{ states('number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature') | float(17) }}"
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature
        data:
          value: 15.0
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.vakantie_actief
  mode: single

- id: vakantie_sync_uit
  alias: "Vakantie: synchroniseer uit"
  description: >
    Deactiveert vakantie zodra input_boolean wordt uitgezet (HA UI).

    NB1: dhw_mode-overgangen worden NIET als trigger gebruikt — die wijzigt
    kortstondig naar Automatic tijdens zonne-overschot cycli en zou anders
    foutief vakantie uitschakelen.
    NB2: heating_mode-overgang `from: Holidays` is OOK GEEN trigger meer —
    sync_aan zet heating_mode zelf terug van Holidays naar Automatic (omdat
    Holidays kamertemp te laag laat zakken), en dat zou anders sync_uit
    direct na sync_aan triggeren (race-condition).

    Acties: dhw_mode terug naar Automatic (als nog op Holidays), heating_mode
    safety-check naar Automatic (zou na sync_aan nooit op Holidays moeten
    staan, maar voor de zekerheid), parallel_shift_temperature herstellen uit
    input_number.vakantie_parallel_shift_backup en backup → 0.

    TDI catch-up: als laatste TDI ≥7 dgn geleden was, wordt direct een
    thermische desinfectie-cyclus gestart (setpoint 62°C, dhw_mode Automatic,
    heating-switch aan, lock on) ongeacht zon, tijd of goedkoopste-uur. Reset
    via tdi_einde_reset (DHW > 60). Vermijdt dat boiler na vakantie nog dagen
    op niet-legionellaveilige 57°C draait voordat reguliere TDI-automation aan
    de beurt komt.

    Notificatie toont DHW/kamer/buiten-temp, laatste TDI, heating-switch en
    de herstelde parallel_shift.
  triggers:
    - trigger: state
      entity_id: input_boolean.vakantie_actief
      to: "off"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.vakantie_actief
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_dhw_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Automatic
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_heating_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_heating_mode
        data:
          option: Automatic
    - if:
      - condition: numeric_state
        entity_id: input_number.vakantie_parallel_shift_backup
        above: 0.1
      then:
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature
        data:
          value: "{{ states('input_number.vakantie_parallel_shift_backup') | float(17) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.vakantie_parallel_shift_backup
        data:
          value: 0
    # TDI catch-up: forceer thermische desinfectie als die ≥7 dgn geleden was.
    # Ongeacht zon, tijd-van-de-dag of goedkoopste-uur — legionellaveiligheid
    # gaat voor energiekost na een vakantieperiode. Reset volgt via
    # tdi_einde_reset (DHW > 60 + setpoint > 60 + dhw_mode Automatic).
    - if:
      - condition: template
        value_template: >
          {% set last = states('input_datetime.tdi_laatste_start') %}
          {{ last in ('unknown', 'unavailable')
             or (now() - as_datetime(last)).days >= 7 }}
      then:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.tdi_laatste_start
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Idem als reguliere TDI-automation: Luxtronik weekly scheduler uit.
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
        data:
          option: 'None'
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Automatic
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_dhw_target_temperature
        data:
          value: 62
      - action: switch.turn_on
        target:
          entity_id: switch.luxtronik_280807_0450_heating
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.tapwater_overschot_lock
      - action: persistent_notification.create
        data:
          title: "TDI catch-up na vakantie"
          notification_id: tdi_catchup_vakantie
          message: >-
            Laatste TDI was ≥7 dgn geleden — TDI nu gestart (setpoint 62°C,
            mode Automatic, heating-switch aan). Reset volgt via tdi_einde_reset
            zodra DHW > 60°C.
    - action: persistent_notification.create
      data:
        title: "Vakantie uitgeschakeld"
        message: >-
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Kamer {{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') }}°C |
          Buiten {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C |
          Laatste TDI {{ states('input_datetime.tdi_laatste_start') }} |
          Heating-switch {{ states('switch.luxtronik_280807_0450_heating') }} |
          Parallel_shift {{ states('number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature') }}°C
  mode: single

- id: vorstbescherming_waarschuwing
  alias: "Vorstbescherming: waarschuwing bij heating Off in koud weer"
  description: >
    Notificatie wanneer buitentemperatuur ≤ 5°C voor ten minste 10 minuten
    EN heating_mode = Off (geen vorstbescherming actief in Luxtronik). Voorkomt
    dat een zomerse Off-stand vergeten wordt vóór de winter, met bevriezings-
    risico in vakanties of bij langdurige afwezigheid. Eénmalige notificatie
    per dalingscyclus (trigger fired alleen bij overgang); mode: single.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.luxtronik_280807_0450_outdoor_temperature
      below: 5
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: select.luxtronik_280807_0450_heating_mode
      state: "Off"
  actions:
    - action: persistent_notification.create
      data:
        title: "⚠ Vorstbescherming inactief"
        notification_id: vorstbescherming_warning
        message: >-
          Buitentemperatuur {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C
          en heating_mode staat op **Off** — Luxtronik geeft geen
          vorstbescherming. Overweeg om heating_mode naar Automatic of
          Holidays te zetten (vooral bij vakantie of langdurige afwezigheid).
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Kamer {{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') }}°C |
          Vakantie {{ states('input_boolean.vakantie_actief') }}.
  mode: single

- id: luxtronik_tdi_dag_check
  alias: "Luxtronik: waarschuwing als TDI-dag intern geactiveerd is"
  description: >
    Bewaakt dat geen van de 8 TDI-dag-vlaggen (parameters 20-27:
    BwTDI_akt_MO/DI/MI/DO/FR/SA/SO/AL) in de Luxtronik op 1 staat. HA
    voert TDI zelf via tdi_legionella_solar_overschot uit; een interne
    Luxtronik-TDI overruled dat en kost ~5 kWh tegen ongunstig nachttarief.
    Triggert (a) bij elke wijziging van de select naar iets anders dan
    "None", en (b) dagelijks om 09:00 voor het geval HA offline was tijdens
    de wijziging. Een tweede trigger op de TDI-doeltemp signaleert ook
    als die per ongeluk weer omhoog gezet wordt.
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
      id: dag_aan
    - trigger: time
      at: "09:00:00"
      id: dagelijkse_check
    - trigger: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_thermal_desinfection_target
      above: 62.5
      id: target_omhoog
  conditions:
    - condition: template
      value_template: >-
        {{ states('select.luxtronik_280807_0450_thermal_desinfection_day') not in ['None', 'unknown', 'unavailable']
           or (states('number.luxtronik_280807_0450_dhw_thermal_desinfection_target') | float(0)) > 62.5 }}
  actions:
    - action: persistent_notification.create
      data:
        title: "⚠ Luxtronik TDI intern geactiveerd"
        notification_id: luxtronik_tdi_intern
        message: >-
          Luxtronik staat ingesteld om zelf een TDI te draaien — HA moet de
          enige TDI-aansturing zijn.

          - TDI-dag: **{{ states('select.luxtronik_280807_0450_thermal_desinfection_day') }}**
          - TDI-doel: **{{ states('number.luxtronik_280807_0450_dhw_thermal_desinfection_target') }}°C**
          - Trigger: {{ trigger.id }}

          Zet `thermal_desinfection_day` terug op **None** en
          `dhw_thermal_desinfection_target` op **62°C** in de Luxtronik-card.
  mode: single

- id: github_nachtelijke_backup
  alias: "GitHub: nachtelijke config backup"
  description: >
    Pusht gewijzigde configuratiebestanden naar GitHub. Triggert om 03:00
    EN bij HA-start om gemiste runs op te vangen (HA offline op 03:00,
    crash tijdens push, etc.). Conditie: marker input_datetime.last_github_backup
    is van een eerdere dag of leeg → één poging per kalenderdag.
    Marker wordt gezet na elke poging (niet alleen na een commit) — anders
    zou een dag zonder wijzigingen tot herhaalde retries leiden.
  triggers:
    - trigger: time
      at: "03:00:00"
    - trigger: homeassistant
      event: start
  conditions:
    - condition: template
      value_template: >
        {% set last = states('input_datetime.last_github_backup') %}
        {% if last in ('unknown', 'unavailable') %}
          true
        {% else %}
          {{ (as_datetime(last) | as_local).date() < now().date() }}
        {% endif %}
  actions:
    - delay:
        seconds: 30
    - action: shell_command.git_backup
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.last_github_backup
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: tapwater_lock_watchdog
  alias: "Tapwater: lock watchdog (timeout)"
  description: >
    Vangnet: zet tapwater_overschot_lock uit als die >6 u aan staat zonder
    actieve hoge-setpoint cyclus (setpoint < 55 EN dhw_mode ≠ Party). Voorkomt
    dat een lock blijft hangen na een gemiste reset (HA-crash, storing, of
    edge-case waarin een reset-trigger niet vuurt) — bij volgende vakantie
    zou de Holidays-fallback in reset-automations dan ten onrechte vuren.
    Orthogonaal aan tapwater_reset_na_bijverwarmen (die reset óók de setpoint);
    deze watchdog raakt setpoint/dhw_mode NIET aan en doet alleen lock-cleanup.
  triggers:
    - trigger: time_pattern
      minutes: '0'
  conditions:
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
      for:
        hours: 6
    - condition: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      below: 55
    - condition: not
      conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_dhw_mode
          state: Party
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Tapwater: lock watchdog"
        notification_id: tapwater_lock_watchdog
        message: >-
          tapwater_overschot_lock stond >6 u aan zonder actieve hoge-setpoint
          cyclus (setpoint {{ states('number.luxtronik_280807_0450_dhw_target_temperature') }}°C,
          mode {{ states('select.luxtronik_280807_0450_dhw_mode') }}). Lock
          uitgezet.
  mode: single

- id: douche_piek_window_check
  alias: "Douche-piek: window check"
  description: >
    Synchroniseert input_boolean.douche_piek_actief met het venster
    [input_datetime.douche_piek_start, input_datetime.douche_piek_eind].
    Triggert elk uur en bij HA-start (robuust tegen downtime tijdens een
    transitie, anders zou een eenmalige time-trigger gemist kunnen worden).
    Stuurt notificatie bij start en eind van de periode.
  triggers:
    - trigger: time_pattern
      minutes: '0'
    - trigger: homeassistant
      event: start
  actions:
    - variables:
        in_window: >
          {% set s = state_attr('input_datetime.douche_piek_start', 'timestamp') %}
          {% set e = state_attr('input_datetime.douche_piek_eind', 'timestamp') %}
          {% set n = as_timestamp(now()) %}
          {{ s is not none and e is not none and s <= n < e }}
    - if:
        - condition: template
          value_template: "{{ in_window and is_state('input_boolean.douche_piek_actief', 'off') }}"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.douche_piek_actief
        - action: persistent_notification.create
          data:
            title: "Douche-piek: gestart"
            notification_id: douche_piek_start_notif
            message: >-
              Douche-piek periode actief tot
              {{ states('input_datetime.douche_piek_eind') }}.
              Pre-charges naar 62°C draaien om 05:30 en 15:30.
    - if:
        - condition: template
          value_template: "{{ not in_window and is_state('input_boolean.douche_piek_actief', 'on') }}"
      then:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.douche_piek_actief
        - action: persistent_notification.create
          data:
            title: "Douche-piek: geëindigd"
            notification_id: douche_piek_end_notif
            message: "Douche-piek periode voorbij. Normale tapwater-logica actief."
  mode: single

- id: douche_piek_precharge_ochtend
  alias: "Douche-piek: pre-charge ochtend (05:30)"
  description: >
    Laadt boiler tot 62°C voor ochtenddouches. Setpoint 62 + dhw_mode Party
    (overruled hysterese zoals bij groot zonne-overschot). Reset via bestaande
    `zonne_overschot_extra_opslag_reset` (DHW>58 + mode Party). Cyclus ~75-90
    min vanaf rust-DHW 48°C → klaar voor 07:00.
    Conditie DHW<55 voorkomt onnodig hertriggeren als boiler al heet is (bv.
    door nacht-cyclus of nachtelijke TDI).
  triggers:
    - trigger: time
      at: "05:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.douche_piek_actief
      state: "on"
    - condition: numeric_state
      entity_id: sensor.luxtronik_280807_0450_dhw_temperature
      below: 55
  actions:
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      data:
        value: 62
    - action: select.select_option
      target:
        entity_id: select.luxtronik_280807_0450_dhw_mode
      data:
        option: Party
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: douche_piek_precharge_middag
  alias: "Douche-piek: pre-charge middag (15:30)"
  description: >
    Laadt boiler tot 62°C voor avonddouches. Tijd 15:30 dekt:
    (a) ochtenddouches hebben DHW vaak naar 35-40°C gebracht → langere cyclus
        nodig (~2-3 u) → klaar voor 18:00,
    (b) middag-zonne-overschot heeft de boiler dan vaak al opgeladen → DHW<55
        conditie voorkomt dubbel-werk. Reset zelfde als ochtend-precharge.
  triggers:
    - trigger: time
      at: "15:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.douche_piek_actief
      state: "on"
    - condition: numeric_state
      entity_id: sensor.luxtronik_280807_0450_dhw_temperature
      below: 55
  actions:
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      data:
        value: 62
    - action: select.select_option
      target:
        entity_id: select.luxtronik_280807_0450_dhw_mode
      data:
        option: Party
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.tapwater_overschot_lock
  mode: single
