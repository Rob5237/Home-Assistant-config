- id: warmtepomp_goedkoop_uur_opwarmen
  alias: "Warmtepomp: extra opwarmen bij goedkoopste uur"
  description: >
    Zet heating_target_correction tijdelijk op +0.5°C op het optimale stookuur.
    Het tijdswindow is groter bij koud weer (meer thermische opslag nodig) en
    kleiner bij mild weer. Formule: clamp(60min…180min, raw×2×30) waarbij
    raw = 1 + 2×(14−t)/24. Alleen actief als kamertemperatuur onder het
    Luxtronik setpoint ligt.
    Trigger op minutes:'1' (i.p.v. elke minuut) geeft de optimaal-startuur
    sensor tijd om te verversen op het hele uur.
  triggers:
    - trigger: time_pattern
      minutes: '1'
  conditions:
    - condition: template
      value_template: >
        {% set opt = states('sensor.warmtepomp_optimaal_startuur') %}
        {{ opt not in ('unknown', 'unavailable', 'onbekend')
           and opt | length >= 2
           and now().hour == opt[:2] | int(-1) }}
    - condition: not
      conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_heating_mode
          state: "Off"
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    - condition: template
      value_template: >
        {% set t_kamer = states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(none) %}
        {% set t_setpoint = states('sensor.luxtronik_280807_0450_room_thermostat_temperature_target') | float(none) %}
        {{ t_kamer is not none and t_setpoint is not none and t_kamer < t_setpoint }}
  actions:
    - variables:
        t_buiten: >
          {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(10) }}
        window_min: >
          {% set t = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(10) %}
          {% set raw = 1 + 2 * (14 - t) / 24 %}
          {{ [[60, (raw * 2) | round | int * 30] | max, 180] | min }}
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0.5
    - delay:
        minutes: "{{ window_min }}"
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0
  mode: single

- id: warmtepomp_correction_reset_op_start
  alias: "Warmtepomp: reset correction bij HA-start"
  description: >
    Bij HA-start: als heating_target_correction nog op een waarde ≠ 0 staat,
    reset naar 0. Voorkomt dat correctie blijft hangen wanneer HA herstart
    tijdens de delay-fase van warmtepomp_goedkoop_uur_opwarmen (mode: single).
  triggers:
    - trigger: homeassistant
      event: start
  conditions:
    - condition: template
      value_template: >
        {{ states('number.luxtronik_280807_0450_heating_target_correction') | float(0) != 0 }}
  actions:
    # Wacht op Luxtronik-entiteiten die na HA-start nog niet altijd direct beschikbaar zijn.
    - delay:
        seconds: 30
    - action: number.set_value
      target:
        entity_id: number.luxtronik_280807_0450_heating_target_correction
      data:
        value: 0
  mode: single

- id: waarschuwing_bij_herinstallatie
  alias: "Systeem: waarschuwing bij herinstallatie"
  triggers:
  - trigger: event
    event_type: home_assistant_start
  actions:
  - action: persistent_notification.create
    data:
      title: Let op!
      message: 'Je staat op het punt Home Assistant te herstarten of te herinstalleren.
        De map /share kan worden overschreven, met submappen /Documenten, /Afbeeldingen
        en /Downloads. Maak eerst een back-up!

        '
  mode: single
- id: tapwater_zonne_overschot_klein
  alias: "Tapwater: opwarmen bij klein zonne-overschot"
  description: >
    Verwarm boiler met WP bij teruglevering >= 2000W EN voldoende zon-forecast
    voor het komende uur (>= 2.0 kWh, som van alle 3 dakgedeeltes via
    forecast_solar) EN actuele Enphase-productie >= 1500W. De forecast is
    een uurgemiddelde dat een wolkenfront aan het begin van het uur niet
    direct registreert; de realtime Enphase-check is een tweede guard die
    voorkomt dat een cyclus start vlak nadat de zon plots wegvalt en daarna
    uit het net gaat trekken tot DHW > 57.
    Setpoint 57°C + dhw_mode Automatic: Luxtronik 10K-hysterese voorkomt korte
    pendel-cycli vanzelf. Lagere aanvoer (richting 57 i.p.v. 62) levert
    ~10-15% betere COP over de cyclus dan een Party-cyclus naar 62.
    DHW-drempel 52°C (was 47): analyse 2 weken toonde ~41 kWh/dag netto
    teruglevering en slechts 4-5 kWh DHW-verbruik. Cyclusstarts bij DHW 43-46
    (bijverwarm-noodgeval) betekenden 14K delta-T = lange cyclus in koude
    tank = COP 2.3-2.7. Met drempel 52 vangt de klein-overschot cyclus
    warmteverlies eerder op (delta-T 5-10K), betere gem. COP en groter
    noodbuffer. Verwacht ~1 extra cyclus/dag; blijft ruim onder pendel-drempel
    (hysterese 10K = min. delta 10K tussen starts).
    Reset loopt via tapwater_reset_na_bijverwarmen (DHW>57 voor 1 min, alleen
    bij solar>-1500 — bij blijvend overschot blijft setpoint 57 staan).
    Escalatie naar 62°C verloopt via tapwater_extra_opslag_groot_overschot
    (P1<-4000W voor 10 min, conditie setpoint 55-60 — past nu).
  triggers:
  - entity_id:
    - sensor.p1_meter_power
    below: -2000
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 52
  - condition: state
    entity_id: binary_sensor.zon_forecast_volgend_uur_voldoende
    state: "on"
  - condition: numeric_state
    entity_id: sensor.envoy_122331077486_current_power_production
    above: 1500
  # Niet klein-overschot draaien als groot-overschot net Party heeft gezet:
  # anders zou setpoint 62→57 en mode Party→Automatic worden overschreven,
  # wat de zonne_overschot_extra_opslag_reset (DHW>58 + mode=Party) breekt.
  - condition: not
    conditions:
    - condition: state
      entity_id: select.luxtronik_280807_0450_dhw_mode
      state: Party
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 57
    action: number.set_value
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: tapwater_extra_opslag_groot_overschot
  alias: "Tapwater: extra opslag bij groot zonne-overschot"
  description: >
    Bij groot teruglevering (P1 < -4000W voor 10 min) en boiler al in
    zonne-overschot boost-modus (setpoint 55-60°C), verhoog setpoint naar
    62°C voor extra opslag. DHW-mode tijdelijk op "Party" om de hysterese
    (10K) te overrulen — anders zou de WP niet opnieuw starten bij DHW>52.
    Reset volgt via zonne_overschot_extra_opslag_reset bij DHW > 58°C
    (zet setpoint→50 en mode→Automatic, of →Holidays tijdens vakantie).
    Veiligheidsreset (interne delay 45 min): als de reguliere reset niet is
    geactiveerd binnen 45 min (bv. omdat user via display dhw_mode handmatig
    heeft gewijzigd zodat de Party-conditie in de reset-automation faalt),
    forceer dan alsnog setpoint→50 + mode→Automatic. Voorkomt achtergebleven
    setpoint 62°C waardoor bij volgend waterverbruik een ongewenste 62°C-
    oplaadcyclus zou starten. 45 min (was 90) volstaat voor een normale
    boost-cyclus naar 62°C (typisch 30-40 min vanaf DHW ~52); een kortere
    safety verkleint het pendel-venster waarin een onverwacht waterverbruik
    de WP opnieuw naar 62 zou laten lopen. Mode: single blokkeert in deze 45
    min nieuwe boost-starts, wat acceptabel is (geen dubbele boost gewenst).
  triggers:
  - entity_id: sensor.p1_meter_power
    below: -4000
    for:
      minutes: 10
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 55
    below: 60
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 61
  - condition: state
    entity_id: binary_sensor.zon_forecast_volgend_uur_voldoende
    state: "on"
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 62
    action: number.set_value
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Party
    action: select.select_option
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  - delay:
      minutes: 45
  # Veiligheidsreset: setpoint nog steeds > 55 betekent reguliere reset
  # is niet geactiveerd (bv. user heeft Party-mode handmatig gewijzigd).
  - if:
    - condition: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      above: 55
    then:
    - target:
        entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      data:
        value: 50
      action: number.set_value
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_dhw_mode
        state: Party
      then:
      - target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: >-
            {% if is_state('input_boolean.vakantie_actief', 'on')
                  and is_state('input_boolean.tapwater_overschot_lock', 'on') %}Holidays{% else %}Automatic{% endif %}
        action: select.select_option
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Zonne-overschot boost: veiligheidsreset"
        notification_id: extra_opslag_safety_reset
        message: >-
          Reguliere reset op DHW>58°C is niet geactiveerd binnen 45 min na
          start van groot-overschot boost. Setpoint geforceerd naar 50°C.
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Mode {{ states('select.luxtronik_280807_0450_dhw_mode') }}.
  mode: single
- id: tdi_legionella_solar_overschot
  alias: "TDI: legionella-cyclus bij laagste daguur"
  description: >
    Elk heel uur overdag (09:00-16:00) wordt gecheckt of dit het goedkoopste
    resterende uur is op basis van Zonneplan tarieven. Klokprogramma 09:30-16:00
    (buiten >= 15°C) of 12:00-16:00 (buiten < 15°C).

    dhw_mode wordt op Party gezet (i.p.v. Automatic) om de 10K-hysterese te
    negeren: bij DHW al > 52°C door een eerdere zonne-cyclus zou Automatic +
    setpoint 62 niet starten (62-10=52), en de TDI-cyclus zou pas later op de
    dag autonoom beginnen — buiten het goedkoopste-uur venster. Reset via
    tdi_einde_reset zet mode terug naar Automatic.

    Startguard DHW ≥ 58: op 07-05 zetten we Party+62 met DHW al 58°C door
    eerdere zonne-boost. Empirisch: Party respecteert wél 10K-hysterese in
    deze Luxtronik-firmware, dus compressor startte pas 16u later bij DHW ~52
    (autonoom, niet op goedkoopste uur). Party+62 hing overnight, opgelost
    door 21:55 watchdog maar niet ideaal. Nieuwe aanpak: bij DHW ≥ 58 slaan
    we het setpoint-boost over (WP zou toch niet starten binnen goedkoopste
    uur), tdi_laatste_start-update slaan we óók over zodat de TDI-check
    volgende dag opnieuw firet zodra DHW voldoende is gezakt (< 58 = ~2-3
    dagen later door natuurlijk warmteverlies). Aanname: DHW ≥ 58 hoge deel
    van de tank betekent recente warmtecyclus, legionella-risico beperkt tot
    volgende poging.
  triggers:
  - trigger: time_pattern
    minutes: '0'
  conditions:
  - condition: time
    after: '09:00:00'
    before: '16:00:00'
  - condition: template
    value_template: >
      {% set last = states('input_datetime.tdi_laatste_start') %}
      {{ last in ('unknown', 'unavailable') or (now().date() - as_datetime(last).date()).days >= 7 }}
  - condition: state
    entity_id: binary_sensor.goedkoopste_tdi_uur_nu
    state: "on"
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 58
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.tdi_laatste_start
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  # Schakel Luxtronik's interne wekelijkse TDI-scheduler uit. HA stuurt de
  # TDI-cyclus zelf aan via dhw_target=62°C; we willen voorkomen dat de pomp
  # autonoom om 00:00 op de geconfigureerde dag óók nog een TDI start.
  - target:
      entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
    data:
      option: 'None'
    action: select.select_option
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Party
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 62
    action: number.set_value
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    then:
    - target:
        entity_id: switch.luxtronik_280807_0450_heating
      action: switch.turn_on
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: tdi_einde_reset
  alias: "TDI: reset na cyclus"
  description: >
    Reset na TDI-cyclus: setpoint terug naar 50°C zodra DHW ≥ 61°C voor 10 min.
    De "voor 10 min" eis borgt Legionella-protocol (afdoding bij ≥60°C vereist
    minimaal 10-11 min houdtijd) — een eenmalig passeren van 60°C door stratificatie
    is onvoldoende. Drempel op 61°C (i.p.v. exact 62°C-setpoint) voorkomt dat
    we eindeloos wachten als de WP bij hoge tank-temperatuur stagneert vlak
    onder setpoint.
    Verwarmingsswitch alleen uit als buitentemp ≥ stookdrempel — anders zou
    ruimteverwarming bij koud weer ten onrechte uitgaan na TDI.
    TDI start nu in Party-mode (om 10K-hysterese te negeren bij hoge DHW),
    dus de mode-conditie staat zowel Party als Automatic toe. Onderscheid van
    zonne-overschot extra-opslag (ook Party, ook setpoint 62): de
    zonne_overschot_extra_opslag_reset triggert al bij DHW > 58 en zou
    setpoint al naar 50 hebben gezet voordat DHW > 61 voor 10 min haalbaar
    is — dus in praktijk firet deze automation alleen na een TDI-cyclus.
    Setpoint > 60 voorkomt onbedoelde trigger bij gewone bijverwarm-cycli
    (setpoint 57) waar restwarmte/overshoot DHW boven 60°C kan duwen.
    Actie zet dhw_mode altijd terug naar Automatic (idempotent als al
    Automatic).
  triggers:
  - id: tdi_klaar
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 61
    for:
      minutes: 10
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 60
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 50
    action: number.set_value
  # Dhw_mode terug: Holidays als vakantie + lock=on, anders Automatic. Single
  # write i.p.v. eerst Automatic dan eventueel Holidays.
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: >-
        {% if is_state('input_boolean.vakantie_actief', 'on')
              and is_state('input_boolean.tapwater_overschot_lock', 'on') %}Holidays{% else %}Automatic{% endif %}
    action: select.select_option
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "off"
    - condition: template
      value_template: >
        {% set t_buiten = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(none) %}
        {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
        {{ t_buiten is not none and t_buiten >= t_drempel }}
    then:
    - target:
        entity_id: switch.luxtronik_280807_0450_heating
      action: switch.turn_off
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: zonne_overschot_extra_opslag_reset
  alias: "Tapwater: reset na extra opslag groot overschot"
  description: >
    Reset zonne-overschot extra opslag (setpoint 62°C, Party-mode): DHW-mode
    terug naar Automatic en setpoint naar 50°C zodra DHW > 58°C. Drempel lager
    dan TDI-reset (60°C) omdat WP bij hoge DHW-temperaturen kan stagneren
    voordat 60°C bereikt wordt; setpoint 62 was alleen bedoeld om hysterese
    te overrulen, niet als hard streefgetal.
    Avond-watchdog (21:55): de DHW>58-trigger is een transitie-trigger en
    vereist een stijgende flank. Als DHW bij start van Party+62 al ≥58 is
    (bv. door eerdere zonne-boost, of een TDI-cyclus die niet doorstookt
    omdat de tank al warm was), firet de trigger nooit en blijft Party+62
    hangen tot de tank ver genoeg is afgekoeld — soms >12u later, buiten
    het bedoelde venster. De watchdog vangt dit op vlak vóór het nachtuur-
    venster (22:00) zodat de nacht met schone setpoint 50/Automatic begint.
    Tijd 21:55 i.p.v. 22:00 om race met `tapwater_goedkoopste_nachtuur`
    (time_pattern minutes:'0') te vermijden — analoog aan
    `tapwater_reset_na_bijverwarmen`. Lock=on borgt dat we alleen een echte
    hangende cyclus resetten en niet een user-gezette Party (dan is de lock
    door `tapwater_overschot_user_intervention` al uit).
  triggers:
  - id: dhw_boven_58
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 58
    trigger: numeric_state
  - id: avond_watchdog
    trigger: time
    at: "21:55:00"
  conditions:
  - condition: state
    entity_id: select.luxtronik_280807_0450_dhw_mode
    state: Party
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 55
  - condition: or
    conditions:
    - condition: trigger
      id: dhw_boven_58
    - condition: and
      conditions:
      - condition: trigger
        id: avond_watchdog
      - condition: state
        entity_id: input_boolean.tapwater_overschot_lock
        state: "on"
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: >-
        {% if is_state('input_boolean.vakantie_actief', 'on')
              and is_state('input_boolean.tapwater_overschot_lock', 'on') %}Holidays{% else %}Automatic{% endif %}
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 50
    action: number.set_value
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single
- id: tapwater_bijverwarmen
  alias: "Tapwater: bijverwarmen bij lage temperatuur"
  description: >
    Verwarm tapwater naar 57°C als het onder 46°C zakt. Blokkeert bij hoog tarief
    (> drempel in input_number.tapwater_tarief_drempel), tenzij noodgeval (< 41°C).
    Drempel 46°C (was 43): 3°C hogere drempel geeft grotere douche-buffer
    (~50L trekking = ~5-6°C drop; van 46 kom je op 40, van 43 op 37 = koud).
    Impact op solar-benutting minimaal — bijverwarmen firet alleen als het
    tarief laag is (bij overschot ligt tarief typisch laag), en klein-overschot
    (nu drempel 52) vangt de meeste warmteverlies al eerder op. Emergency
    <41°C ongewijzigd.
  triggers:
  - entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 46
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.luxtronik_280807_0450_dhw_temperature
      below: 41
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.vakantie_actief
        state: "off"
      - condition: template
        value_template: >
          {% set tarief = states('sensor.zonneplan_current_electricity_tariff') | float(0.30) %}
          {% set drempel = states('input_number.tapwater_tarief_drempel') | float(0.25) %}
          {{ tarief <= drempel }}
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 57
    action: number.set_value
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_reset_na_bijverwarmen
  alias: "Tapwater: reset na bijverwarmen"
  description: >
    Zet setpoint terug naar 50°C zodra tapwater 57°C bereikt (setpoint bereikt).
    Niet tijdens TDI (setpoint 62°C) en niet bij actief zonne-overschot (dan
    blijven doorladen). 50°C als rust-setpoint voorkomt dat de Luxtronik autonoom
    cycli draait onder 40°C (50 - 10K hysterese).
    Sneller-detectie via for: 1 min (was 2 min) verlaagt de kans dat een korte
    overshoot-piek gemist wordt; drempel 57 blijft bewust staan zodat de trigger
    alleen na bereiken setpoint firet (lager zou cyclus halverwege afbreken).
    Avond-watchdog (21:55): de DHW>57-trigger is een transitie-trigger en kan
    gemist worden als P1<-1500 op moment van stijging (conditie faalt, daarna
    firet de trigger niet meer). Een tweede kans vlak vóór het nachtvenster
    reset alsnog wanneer lock=on en setpoint nog 50-60.
    Dag-watchdog (13:55) doet hetzelfde vlak vóór het TDI-venster (start typisch
    14:00 of later op het goedkoopste uur). Extra guard `DHW > 56`: de
    dag-watchdog mag een actief lopende ochtend-cyclus niet afbreken
    (avond is dat geen risico — om 21:55 zijn alle cycli normaal lang
    afgerond).
    Tijd is bewust 21:55 i.p.v. 22:00 om race-condition met
    `tapwater_goedkoopste_nachtuur` te vermijden: die triggert op
    `time_pattern minutes:'0'` en zou óók om 22:00:00 geactiveerd kunnen worden als 22 het
    goedkoopste uur in het 22-06 venster is. HA garandeert geen volgorde
    tussen twee time-triggers op exact hetzelfde tijdstip — bij watchdog-na-
    nachtuur uitvoering zou setpoint 57 (net gezet door nachtuur) direct
    teruggezet worden naar 50 en de geplande nachtopwarming volledig missen.
    21:55 garandeert een schone uitgangstoestand (setpoint 50, lock off) als
    het nachtvenster om 22:00:00 opengaat. 13:55 ligt analoog vóór het TDI-uur.
  triggers:
  - id: dhw_boven_57
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    above: 57
    for:
      minutes: 1
    trigger: numeric_state
  - id: avond_watchdog
    trigger: time
    at: "21:55:00"
  - id: dag_watchdog
    trigger: time
    at: "13:55:00"
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: dhw_boven_57
    - condition: and
      conditions:
      - condition: trigger
        id: avond_watchdog
      - condition: state
        entity_id: input_boolean.tapwater_overschot_lock
        state: "on"
    - condition: and
      conditions:
      - condition: trigger
        id: dag_watchdog
      - condition: state
        entity_id: input_boolean.tapwater_overschot_lock
        state: "on"
      - condition: numeric_state
        entity_id: sensor.luxtronik_280807_0450_dhw_temperature
        above: 56
  - condition: template
    value_template: >
      {% set setpoint = state_attr('water_heater.luxtronik_280807_0450_domestic_water',
        'temperature') | float(0) %}
      {% set solar = states('sensor.p1_meter_power') | float(0) %}
      {{ 50 < setpoint < 60 and solar > -1500 }}
  actions:
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 50
    action: number.set_value
  - if:
    - condition: state
      entity_id: input_boolean.vakantie_actief
      state: "on"
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
    then:
    - target:
        entity_id: select.luxtronik_280807_0450_dhw_mode
      data:
        option: Holidays
      action: select.select_option
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_goedkoopste_nachtuur
  alias: "Tapwater: opwarmen in goedkoopste nachtuur"
  description: >
    Elk heel uur tussen 22:00 en 06:00 wordt gecheckt of dit het goedkoopste uur
    in het nachtvenster is (Zonneplan forecast). Als ja en tapwater < 54°C → opwarmen
    naar 57°C. Reset volgt via tapwater_reset_na_bijverwarmen.
  triggers:
  - trigger: time_pattern
    minutes: '0'
  conditions:
  - condition: state
    entity_id: input_boolean.vakantie_actief
    state: "off"
  - condition: numeric_state
    entity_id: sensor.luxtronik_280807_0450_dhw_temperature
    below: 54
  - condition: state
    entity_id: binary_sensor.goedkoopste_nachtuur_nu
    state: "on"
  actions:
  - target:
      entity_id: select.luxtronik_280807_0450_dhw_mode
    data:
      option: Automatic
    action: select.select_option
  - target:
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    data:
      value: 57
    action: number.set_value
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.tapwater_overschot_lock
  mode: single

- id: tapwater_overschot_user_intervention
  alias: "Tapwater: lock uitzetten bij handmatige dhw_mode wijziging"
  description: >
    Detecteert handmatige dhw_mode-wijzigingen tijdens een actieve
    opwarm-cyclus (HA UI of Luxtronik-display/RBE). Wanneer de user
    overneemt, wordt de lock uitgezet zodat de bijbehorende reset-
    automation dhw_mode NIET terugzet naar Holidays — de user-intent
    wint.

    Context-detectie:
    • UI-actie → context.user_id is gevuld
    • Luxtronik RBE/integration push → context.parent_id is None
    • Onze eigen automation-actie → context.parent_id is gevuld én
      user_id is None → condition matched niet → lock blijft staan
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_dhw_mode
  conditions:
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
    - condition: template
      value_template: >
        {{ trigger.to_state.context.user_id is not none
           or trigger.to_state.context.parent_id is none }}
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Tapwater: user-overname gedetecteerd"
        notification_id: tapwater_user_intervention
        message: >-
          dhw_mode handmatig gewijzigd naar
          **{{ trigger.to_state.state }}** tijdens actieve opwarm-cyclus.
          Reset-automation zal dhw_mode NIET terugzetten naar Holidays.
  mode: single

- id: vakantie_sync_aan
  alias: "Vakantie: synchroniseer aan"
  description: >
    Activeert input_boolean.vakantie_actief zodra dhw_mode of heating_mode op
    Holidays wordt gezet (Luxtronik-display), of zodra de boolean handmatig
    in HA wordt aangezet.

    Heating gaat NIET op Holidays — die mode hanteert intern een zeer lage
    curve waardoor kamertemp bij koud weer onder 10°C kan zakken. In plaats
    daarvan blijft heating_mode op Automatic en wordt
    heating_curve_parallel_shift_temperature tijdelijk verlaagd naar 15.0°C
    (vakantie-stooklijn). De oorspronkelijke waarde staat in
    input_number.vakantie_parallel_shift_backup (0 = geen backup actief; de
    Luxtronik-range is 5-35°C dus 0 is een veilige sentinel-waarde).

    Circuit-keuze: alleen heating_curve_parallel_shift_temperature wordt
    aangepast (= hoofd-verwarmingscircuit). De circuit1/2/3-shifts blijven
    onaangeroerd omdat de gemengde circuits niet actief gebruikt worden in
    deze installatie (flow_in_circuit1/2/3_target_temperature = 0.0 — de
    Luxtronik regelt enkel het hoofdcircuit). Mocht in de toekomst een
    mixed-circuit aangezet worden, dan ook
    heating_curve_circuit1_parallel_shift_temperature meeschalen.

    Heating_mode wordt teruggezet naar Automatic als die op Holidays stond
    (Luxtronik-display gebruiker). Dhw_mode gaat wel naar Holidays (respecteert
    "Off"). Idempotent: backup wordt alleen gemaakt als die nog 0 is, dus
    herhaalde sync_aan-runs overschrijven de backup niet.
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_dhw_mode
      to: Holidays
    - trigger: state
      entity_id: select.luxtronik_280807_0450_heating_mode
      to: Holidays
    - trigger: state
      entity_id: input_boolean.vakantie_actief
      to: "on"
  actions:
    - if:
      - condition: not
        conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_dhw_mode
          state: "Off"
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Holidays
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_heating_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_heating_mode
        data:
          option: Automatic
    - if:
      - condition: numeric_state
        entity_id: input_number.vakantie_parallel_shift_backup
        below: 0.1
      then:
      - action: input_number.set_value
        target:
          entity_id: input_number.vakantie_parallel_shift_backup
        data:
          value: "{{ states('number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature') | float(17) }}"
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature
        data:
          value: 15.0
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.vakantie_actief
  mode: single

- id: vakantie_sync_uit
  alias: "Vakantie: synchroniseer uit"
  description: >
    Deactiveert vakantie zodra input_boolean wordt uitgezet (HA UI).

    NB1: dhw_mode-overgangen worden NIET als trigger gebruikt — die wijzigt
    kortstondig naar Automatic tijdens zonne-overschot cycli en zou anders
    foutief vakantie uitschakelen.
    NB2: heating_mode-overgang `from: Holidays` is OOK GEEN trigger meer —
    sync_aan zet heating_mode zelf terug van Holidays naar Automatic (omdat
    Holidays kamertemp te laag laat zakken), en dat zou anders sync_uit
    direct na sync_aan triggeren (race-condition).

    Acties: dhw_mode terug naar Automatic (als nog op Holidays), heating_mode
    safety-check naar Automatic (zou na sync_aan nooit op Holidays moeten
    staan, maar voor de zekerheid), parallel_shift_temperature herstellen uit
    input_number.vakantie_parallel_shift_backup en backup → 0.

    TDI catch-up: als laatste TDI ≥7 dgn geleden was, wordt direct een
    thermische desinfectie-cyclus gestart (setpoint 62°C, dhw_mode Automatic,
    heating-switch aan, lock on) ongeacht zon, tijd of goedkoopste-uur. Reset
    via tdi_einde_reset (DHW > 60). Vermijdt dat boiler na vakantie nog dagen
    op niet-legionellaveilige 57°C draait voordat reguliere TDI-automation aan
    de beurt komt.

    Notificatie toont DHW/kamer/buiten-temp, laatste TDI, heating-switch en
    de herstelde parallel_shift.
  triggers:
    - trigger: state
      entity_id: input_boolean.vakantie_actief
      to: "off"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.vakantie_actief
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_dhw_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Automatic
    - if:
      - condition: state
        entity_id: select.luxtronik_280807_0450_heating_mode
        state: Holidays
      then:
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_heating_mode
        data:
          option: Automatic
    - if:
      - condition: numeric_state
        entity_id: input_number.vakantie_parallel_shift_backup
        above: 0.1
      then:
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature
        data:
          value: "{{ states('input_number.vakantie_parallel_shift_backup') | float(17) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.vakantie_parallel_shift_backup
        data:
          value: 0
    # TDI catch-up: forceer thermische desinfectie als die ≥7 dgn geleden was.
    # Ongeacht zon, tijd-van-de-dag of goedkoopste-uur — legionellaveiligheid
    # gaat voor energiekost na een vakantieperiode. Reset volgt via
    # tdi_einde_reset (DHW > 60 + setpoint > 60 + dhw_mode Automatic).
    - if:
      - condition: template
        value_template: >
          {% set last = states('input_datetime.tdi_laatste_start') %}
          {{ last in ('unknown', 'unavailable')
             or (now().date() - as_datetime(last).date()).days >= 7 }}
      then:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.tdi_laatste_start
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Idem als reguliere TDI-automation: Luxtronik weekly scheduler uit.
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
        data:
          option: 'None'
      - action: select.select_option
        target:
          entity_id: select.luxtronik_280807_0450_dhw_mode
        data:
          option: Automatic
      - action: number.set_value
        target:
          entity_id: number.luxtronik_280807_0450_dhw_target_temperature
        data:
          value: 62
      - action: switch.turn_on
        target:
          entity_id: switch.luxtronik_280807_0450_heating
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.tapwater_overschot_lock
      - action: persistent_notification.create
        data:
          title: "TDI catch-up na vakantie"
          notification_id: tdi_catchup_vakantie
          message: >-
            Laatste TDI was ≥7 dgn geleden — TDI nu gestart (setpoint 62°C,
            mode Automatic, heating-switch aan). Reset volgt via tdi_einde_reset
            zodra DHW > 60°C.
    - action: persistent_notification.create
      data:
        title: "Vakantie uitgeschakeld"
        message: >-
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Kamer {{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') }}°C |
          Buiten {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C |
          Laatste TDI {{ states('input_datetime.tdi_laatste_start') }} |
          Heating-switch {{ states('switch.luxtronik_280807_0450_heating') }} |
          Parallel_shift {{ states('number.luxtronik_280807_0450_heating_curve_parallel_shift_temperature') }}°C
  mode: single

- id: vorstbescherming_waarschuwing
  alias: "Vorstbescherming: waarschuwing bij heating Off in koud weer"
  description: >
    Notificatie wanneer buitentemperatuur ≤ 5°C voor ten minste 10 minuten
    EN heating_mode = Off (geen vorstbescherming actief in Luxtronik). Voorkomt
    dat een zomerse Off-stand vergeten wordt vóór de winter, met bevriezings-
    risico in vakanties of bij langdurige afwezigheid. Eénmalige notificatie
    per dalingscyclus (trigger wordt alleen bij overgang geactiveerd); mode: single.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.luxtronik_280807_0450_outdoor_temperature
      below: 5
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: select.luxtronik_280807_0450_heating_mode
      state: "Off"
  actions:
    - action: persistent_notification.create
      data:
        title: "⚠ Vorstbescherming inactief"
        notification_id: vorstbescherming_warning
        message: >-
          Buitentemperatuur {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C
          en heating_mode staat op **Off** — Luxtronik geeft geen
          vorstbescherming. Overweeg om heating_mode naar Automatic of
          Holidays te zetten (vooral bij vakantie of langdurige afwezigheid).
          DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
          Kamer {{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') }}°C |
          Vakantie {{ states('input_boolean.vakantie_actief') }}.
  mode: single

- id: luxtronik_tdi_dag_check
  alias: "Luxtronik: waarschuwing als TDI-dag intern geactiveerd is"
  description: >
    Bewaakt dat geen van de 8 TDI-dag-vlaggen (parameters 20-27:
    BwTDI_akt_MO/DI/MI/DO/FR/SA/SO/AL) in de Luxtronik op 1 staat. HA
    voert TDI zelf via tdi_legionella_solar_overschot uit; een interne
    Luxtronik-TDI overruled dat en kost ~5 kWh tegen ongunstig nachttarief.
    Triggert (a) bij elke wijziging van de select naar iets anders dan
    "None", en (b) dagelijks om 09:00 voor het geval HA offline was tijdens
    de wijziging. Een tweede trigger op de TDI-doeltemp signaleert ook
    als die per ongeluk weer omhoog gezet wordt.
  triggers:
    - trigger: state
      entity_id: select.luxtronik_280807_0450_thermal_desinfection_day
      id: dag_aan
    - trigger: time
      at: "09:00:00"
      id: dagelijkse_check
    - trigger: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_thermal_desinfection_target
      above: 62.5
      id: target_omhoog
  conditions:
    - condition: template
      value_template: >-
        {{ states('select.luxtronik_280807_0450_thermal_desinfection_day') not in ['None', 'unknown', 'unavailable']
           or (states('number.luxtronik_280807_0450_dhw_thermal_desinfection_target') | float(0)) > 62.5 }}
  actions:
    - action: persistent_notification.create
      data:
        title: "⚠ Luxtronik TDI intern geactiveerd"
        notification_id: luxtronik_tdi_intern
        message: >-
          Luxtronik staat ingesteld om zelf een TDI te draaien — HA moet de
          enige TDI-aansturing zijn.

          - TDI-dag: **{{ states('select.luxtronik_280807_0450_thermal_desinfection_day') }}**
          - TDI-doel: **{{ states('number.luxtronik_280807_0450_dhw_thermal_desinfection_target') }}°C**
          - Trigger: {{ trigger.id }}

          Zet `thermal_desinfection_day` terug op **None** en
          `dhw_thermal_desinfection_target` op **62°C** in de Luxtronik-card.
  mode: single

- id: github_nachtelijke_backup
  alias: "GitHub: nachtelijke config backup"
  description: >
    Pusht gewijzigde configuratiebestanden naar GitHub. Triggert om 03:00
    EN bij HA-start om gemiste runs op te vangen (HA offline op 03:00,
    crash tijdens push, etc.). Conditie: marker input_datetime.last_github_backup
    is van een eerdere dag of leeg → één poging per kalenderdag.
    Marker wordt gezet na elke poging (niet alleen na een commit) — anders
    zou een dag zonder wijzigingen tot herhaalde retries leiden.
  triggers:
    - trigger: time
      at: "03:00:00"
    - trigger: homeassistant
      event: start
  conditions:
    - condition: template
      value_template: >
        {% set last = states('input_datetime.last_github_backup') %}
        {% if last in ('unknown', 'unavailable') %}
          true
        {% else %}
          {{ (as_datetime(last) | as_local).date() < now().date() }}
        {% endif %}
  actions:
    - delay:
        seconds: 30
    - action: shell_command.git_backup
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.last_github_backup
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: tapwater_lock_watchdog
  alias: "Tapwater: lock watchdog (timeout)"
  description: >
    Vangnet: zet tapwater_overschot_lock uit als die >6 u aan staat zonder
    actieve hoge-setpoint cyclus (setpoint < 55 EN dhw_mode ≠ Party). Voorkomt
    dat een lock blijft hangen na een gemiste reset (HA-crash, storing, of
    edge-case waarin een reset-trigger niet activeert) — bij volgende vakantie
    zou de Holidays-fallback in reset-automations dan ten onrechte activeren.
    Orthogonaal aan tapwater_reset_na_bijverwarmen (die reset óók de setpoint);
    deze watchdog raakt setpoint/dhw_mode NIET aan en doet alleen lock-cleanup.
  triggers:
    - trigger: time_pattern
      minutes: '0'
  conditions:
    - condition: state
      entity_id: input_boolean.tapwater_overschot_lock
      state: "on"
      for:
        hours: 6
    - condition: numeric_state
      entity_id: number.luxtronik_280807_0450_dhw_target_temperature
      below: 55
    - condition: not
      conditions:
        - condition: state
          entity_id: select.luxtronik_280807_0450_dhw_mode
          state: Party
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.tapwater_overschot_lock
    - action: persistent_notification.create
      data:
        title: "Tapwater: lock watchdog"
        notification_id: tapwater_lock_watchdog
        message: >-
          tapwater_overschot_lock stond >6 u aan zonder actieve hoge-setpoint
          cyclus (setpoint {{ states('number.luxtronik_280807_0450_dhw_target_temperature') }}°C,
          mode {{ states('select.luxtronik_280807_0450_dhw_mode') }}). Lock
          uitgezet.
  mode: single

- id: compressor_starts_week_check_2026_06_27
  alias: "Warmtepomp: weekcheck compressor-starts (2026-06-27)"
  description: >
    Eenmalige meting van compressor-starts dag/nacht verdeling 1 week na
    rust-setpoint 48→50 en hysterese 8K→10K wijzigingen (2026-06-20). Doel:
    bevestigen of starts naar zonne-uren zijn verschoven. Baseline pre-wijziging
    (recorder 2026-06-10 t/m 2026-06-20): 60% dag / 40% nacht over 12 starts.
    Trigger via dagelijkse 11:00 + datum-conditie, dus fire-once op 2026-06-27.
    Automation mag na uitvoering verwijderd worden (dode code na die datum).
  triggers:
  - trigger: time
    at: "11:00:00"
  conditions:
  - condition: template
    value_template: "{{ now().strftime('%Y-%m-%d') == '2026-06-27' }}"
  actions:
  - variables:
      dag: "{{ states('input_number.compressor_starts_dag') | int(0) }}"
      nacht: "{{ states('input_number.compressor_starts_nacht') | int(0) }}"
      totaal: "{{ dag + nacht }}"
      nacht_pct: "{{ (nacht / totaal * 100) | round(0) if totaal > 0 else 0 }}"
      dag_pct: "{{ 100 - nacht_pct }}"
      gem_per_dag: "{{ (totaal / 7) | round(1) }}"
      advies: >-
        {% if totaal == 0 %}Geen starts gemeten — controleer of de teller-automation actief was.
        {% elif nacht_pct <= 40 %}Nacht-aandeel ({{ nacht_pct }}%) ≤ 40% baseline — geen winst van 10K+50, overweeg 12K+50 voor echte solar-shift.
        {% elif nacht_pct > 50 %}Nacht-aandeel ({{ nacht_pct }}%) hoger dan baseline — ongunstig, overweeg terug naar 8K+48.
        {% else %}Nacht-aandeel ({{ nacht_pct }}%) rond baseline — stabiel, beslissing pending op meer data.
        {% endif %}
  - action: persistent_notification.create
    data:
      title: "Compressor-starts weekmeting"
      notification_id: compressor_starts_week_check
      message: >-
        Periode 2026-06-20 t/m 2026-06-27 (7 dagen).
        Totaal: {{ totaal }} starts ({{ gem_per_dag }}/dag).
        Dag (06-22u): {{ dag }} ({{ dag_pct }}%) | Nacht (22-06u): {{ nacht }} ({{ nacht_pct }}%).
        Baseline pre-wijziging: 60% dag / 40% nacht over 1,2 starts/dag.
        Conclusie: {{ advies }}
  mode: single

- id: compressor_starts_counter
  alias: "Warmtepomp: tel compressor-starts dag/nacht"
  description: >
    Telt elke compressor off→on transitie en split op tijdvenster (lokale tijd):
    dag = 06:00-22:00, nacht = 22:00-06:00. KPI om effect van rust-setpoint/
    hysterese-wijzigingen op solar-shift te meten. Gebruikt input_number i.p.v.
    counter omdat counter geen reload-service heeft (zou core restart vereisen).
  triggers:
  - trigger: state
    entity_id: binary_sensor.luxtronik_280807_0450_compressor
    from: "off"
    to: "on"
  actions:
  - choose:
    - conditions:
      - condition: time
        after: "06:00:00"
        before: "22:00:00"
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.compressor_starts_dag
        data:
          value: "{{ states('input_number.compressor_starts_dag') | int(0) + 1 }}"
    default:
    - action: input_number.set_value
      target:
        entity_id: input_number.compressor_starts_nacht
      data:
        value: "{{ states('input_number.compressor_starts_nacht') | int(0) + 1 }}"
  mode: single

- id: warmtepomp_korte_cyclus_detector
  alias: "Warmtepomp: korte cyclus detector (<10 min)"
  description: >
    Detecteert pendelen: notificeert wanneer een compressor on-fase < 10 min
    duurde. Berekent duur tussen off→on (trigger.from_state.last_changed) en
    on→off (trigger.to_state.last_changed). Bij Luxtronik DHW-cycli is een
    gezonde aan-fase typisch 25-60 min (afhankelijk van setpoint en DHW-start
    temperatuur); aan-fasen <10 min wijzen op een instelling die
    hysterese-overrule te kort houdt, of conflicterende automaties die
    setpoint mid-cyclus terug naar 50 zetten. Twee notificaties binnen 24u
    is een signaal om instellingen te herzien (Party-safety, reset-timing).
  triggers:
  - trigger: state
    entity_id: binary_sensor.luxtronik_280807_0450_compressor
    from: "on"
    to: "off"
  conditions:
  - condition: template
    value_template: >
      {% set start = trigger.from_state.last_changed %}
      {% set einde = trigger.to_state.last_changed %}
      {{ start is not none and einde is not none
         and (einde - start).total_seconds() < 600 }}
  actions:
  - variables:
      duur_sec: "{{ (trigger.to_state.last_changed - trigger.from_state.last_changed).total_seconds() | int }}"
      duur_min: "{{ (duur_sec / 60) | round(1) }}"
  - action: persistent_notification.create
    data:
      title: "⚠ Warmtepomp: korte cyclus ({{ duur_min }} min)"
      notification_id: "wp_korte_cyclus_{{ now().strftime('%Y%m%d_%H%M') }}"
      message: >-
        Compressor aan-fase was {{ duur_min }} min (< 10 min drempel).
        DHW {{ states('sensor.luxtronik_280807_0450_dhw_temperature') }}°C |
        Setpoint {{ states('number.luxtronik_280807_0450_dhw_target_temperature') }}°C |
        Mode {{ states('select.luxtronik_280807_0450_dhw_mode') }} |
        Buiten {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') }}°C |
        Aanvoer {{ states('sensor.luxtronik_280807_0450_flow_in_temperature') }}°C.
        Bij herhaling: controleer reset-automaties en Party-safety timing.
  mode: parallel
  max: 3

- id: compressor_starts_monthly_reset
  alias: "Warmtepomp: maandelijkse reset compressor-tellers"
  description: >
    Reset compressor_starts_dag en _nacht naar 0 op de 1e van elke maand om
    00:01. Houdt KPI bruikbaar voor maand-over-maand trending. Trigger om
    00:01 (niet 00:00) om eventuele dagovergangs-jitter in time-triggers te
    vermijden.
  triggers:
  - trigger: time
    at: "00:01:00"
  conditions:
  - condition: template
    value_template: "{{ now().day == 1 }}"
  actions:
  - action: input_number.set_value
    target:
      entity_id: input_number.compressor_starts_dag
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.compressor_starts_nacht
    data:
      value: 0
  mode: single

- id: kamer_gelijk_buiten_actueel_signaal
  alias: "Signaal: kamertemp ≈ buitentemp (actueel)"
  description: >
    Vergelijkt kamertemperatuur met de actueel waargenomen buitentemperatuur
    van weather.thuis (attribuut temperature, internet-bron voor de omgeving
    Den Bosch). Verstuurt een persistent notification als beide binnen ±0.5°C
    liggen. Herevalueert ieder uur op HH:05. Notificatie wordt automatisch
    gedismist zodra het verschil weer > 0.5°C is; stabiele notification_id
    zorgt dat opeenvolgende updates de bestaande melding vervangen in plaats
    van te stapelen.
  triggers:
  - trigger: time_pattern
    minutes: 5
  actions:
  - variables:
      buiten_actueel: "{{ state_attr('weather.thuis', 'temperature') | float(-999) }}"
      kamer_temp: "{{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) }}"
      verschil: "{{ (kamer_temp - buiten_actueel) | abs }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ kamer_temp > -900 and buiten_actueel > -900 and verschil <= 0.5 }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: "🌡 Kamer ≈ buiten (actueel)"
          notification_id: kamer_gelijk_buiten_actueel
          message: >-
            Kamertemperatuur {{ kamer_temp }}°C is binnen 0.5°C gelijk aan de
            actueel waargenomen buitentemperatuur ({{ buiten_actueel }}°C,
            bron weather.thuis).
    default:
    - action: persistent_notification.dismiss
      data:
        notification_id: kamer_gelijk_buiten_actueel
  mode: single
