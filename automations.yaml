- id: kamer_trend_tracker
  alias: "Kamer trend tracker (extremum + 0.2°C reversal-detectie)"
  description: >
    Volgt de kamertemperatuur en detecteert trend-omkeringen: houdt het
    laatste piek/dal-punt (extremum) bij in input_number.kamer_ref_temp en
    de huidige trendrichting in input_boolean.kamer_stijgt. Zolang de trend
    doorloopt schuift het extremum mee met elke nieuwe piek/dal-waarde.
    Zodra de kamertemp ≥0,2°C tegen de trend in beweegt is dat een
    bevestigde omkering: richting wordt geflipt, extremum ge-reset naar de
    huidige waarde, alle 5 signaal-helpers worden gereset naar off (zodat de
    eerstvolgende push weer luid met heads-up wordt), en het event
    'kamer_temp_reversal' wordt afgevuurd (event_data: richting =
    'naar_stijgend' of 'naar_dalend', temp = huidige kamertemp). Andere
    automations kunnen dat event als trigger gebruiken. Bij HA-start wordt
    ref opnieuw geïnitialiseerd met de huidige sensor-waarde. Sentinel voor
    'niet-geinit': ref < -900. Mode: parallel zodat opeenvolgende sensor-
    updates niet worden overgeslagen.
  triggers:
  - trigger: state
    entity_id: sensor.luxtronik_280807_0450_room_thermostat_temperature
  - trigger: homeassistant
    event: start
  actions:
  - variables:
      cur: >-
        {% if trigger.platform == 'state' %}
          {{ trigger.to_state.state | float(-999) }}
        {% else %}
          {{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) }}
        {% endif %}
      ref: "{{ states('input_number.kamer_ref_temp') | float(-999) }}"
      ref_last: "{{ states.input_number.kamer_ref_temp.last_changed }}"
      stijgt: "{{ is_state('input_boolean.kamer_stijgt', 'on') }}"
      geinit: "{{ ref > -900 and ref != 0 }}"
      is_ha_start: "{{ trigger.platform == 'homeassistant' }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ cur <= -900 }}"
      sequence: []
    - conditions:
      - condition: template
        value_template: "{{ is_ha_start or not geinit }}"
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.kamer_ref_temp
        data:
          value: "{{ cur }}"
    - conditions:
      - condition: template
        value_template: "{{ stijgt and cur >= ref }}"
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.kamer_ref_temp
        data:
          value: "{{ cur }}"
    - conditions:
      - condition: template
        value_template: "{{ stijgt and (ref - cur) >= 0.2 }}"
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.kamer_stijgt
      - action: input_number.set_value
        target:
          entity_id: input_number.kamer_ref_temp
        data:
          value: "{{ cur }}"
      - action: input_boolean.turn_off
        target:
          entity_id:
          - input_boolean.ventileren_signaal_actief
          - input_boolean.sluit_ramen_signaal_actief
          - input_boolean.ramen_dicht_signaal_actief
          - input_boolean.regen_signaal_actief
          - input_boolean.nachtventilatie_signaal_actief
      - event: kamer_temp_reversal
        event_data:
          richting: naar_dalend
          temp: "{{ cur }}"
          extremum: "{{ ref }}"
          extremum_tijd: "{{ ref_last }}"
    - conditions:
      - condition: template
        value_template: "{{ not stijgt and cur <= ref }}"
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.kamer_ref_temp
        data:
          value: "{{ cur }}"
    - conditions:
      - condition: template
        value_template: "{{ not stijgt and (cur - ref) >= 0.2 }}"
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.kamer_stijgt
      - action: input_number.set_value
        target:
          entity_id: input_number.kamer_ref_temp
        data:
          value: "{{ cur }}"
      - action: input_boolean.turn_off
        target:
          entity_id:
          - input_boolean.ventileren_signaal_actief
          - input_boolean.sluit_ramen_signaal_actief
          - input_boolean.ramen_dicht_signaal_actief
          - input_boolean.regen_signaal_actief
          - input_boolean.nachtventilatie_signaal_actief
      - event: kamer_temp_reversal
        event_data:
          richting: naar_stijgend
          temp: "{{ cur }}"
          extremum: "{{ ref }}"
          extremum_tijd: "{{ ref_last }}"
  mode: parallel
  max: 20

- id: kamer_reversal_melding
  alias: "Signaal: kamer trend-omkering ≥0,2°C"
  description: >
    Verstuurt bij elk 'kamer_temp_reversal' event (van kamer_trend_tracker
    — bevestigde 0,2°C omkering) één mobile-app + HA-UI push met de nieuwe
    trendrichting, het extremum (laagst of hoogst gemeten) en de huidige
    kamertemp. Bij een naar_stijgend reversal bevat dezelfde push ook het
    advies om ramen en tuindeuren te sluiten om de koelte binnen te houden
    (geen aparte tweede notificatie meer). Alle andere ventilatie-signalen
    worden bij activeren gewist (cross-clear). In stil-venster 22:30-07:30
    wordt het (stil) kanaal gebruikt (geen wek-geluid). Vakantie-
    onderdrukking actief.
  triggers:
  - trigger: event
    event_type: kamer_temp_reversal
  conditions:
  - condition: state
    entity_id: input_boolean.vakantie_actief
    state: "off"
  actions:
  - variables:
      stil_venster: "{{ now().hour >= 23 or now().hour < 7 or (now().hour == 22 and now().minute >= 30) or (now().hour == 7 and now().minute < 30) }}"
      kamer_temp: "{{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) }}"
      extremum: "{{ trigger.event.data.extremum | float(-999) }}"
      richting: "{{ trigger.event.data.richting }}"
      is_stijgend: "{{ richting == 'naar_stijgend' }}"
      pijl: "{{ '↗' if is_stijgend else '↘' }}"
      actie_txt: "{{ 'stijgt weer' if is_stijgend else 'daalt weer' }}"
      extremum_label: "{{ 'Laagst gemeten' if is_stijgend else 'Hoogst gemeten' }}"
      extremum_tijd_raw: "{{ trigger.event.data.extremum_tijd }}"
      extremum_hhmm: >-
        {% set d = as_datetime(extremum_tijd_raw) %}
        {% if d %}{{ (d | as_local).strftime('%H:%M') }}{% else %}—{% endif %}
      reversal_msg: >-
        {% if is_stijgend %}Sluit ramen en tuindeuren om de koelte binnen te houden. {{ extremum_label }}: {{ extremum }}°C om {{ extremum_hhmm }}. Nu: {{ kamer_temp }}°C.{% else %}{{ extremum_label }}: {{ extremum }}°C om {{ extremum_hhmm }}. Nu: {{ kamer_temp }}°C.{% endif %}
  # Reversal is leidend — wis alle andere ventilatie-signaal meldingen zodat er
  # geen tegenstrijdig advies zichtbaar blijft. De sluit-ramen-advies zit bij
  # naar_stijgend in de reversal-push zelf (geen aparte tweede notificatie).
  - action: notify.mobile_app_sm_g781b
    data:
      message: clear_notification
      data:
        tag: kamer_te_koel_sluit_ramen
  - action: persistent_notification.dismiss
    data:
      notification_id: kamer_te_koel_sluit_ramen
  - action: notify.mobile_app_sm_g781b
    data:
      message: clear_notification
      data:
        tag: kamer_warm_buiten_warmer
  - action: persistent_notification.dismiss
    data:
      notification_id: kamer_warm_buiten_warmer
  - action: notify.mobile_app_sm_g781b
    data:
      message: clear_notification
      data:
        tag: kamer_regen
  - action: persistent_notification.dismiss
    data:
      notification_id: kamer_regen
  - action: notify.mobile_app_sm_g781b
    data:
      message: clear_notification
      data:
        tag: nachtventilatie
  - action: persistent_notification.dismiss
    data:
      notification_id: nachtventilatie
  - action: notify.mobile_app_sm_g781b
    data:
      message: clear_notification
      data:
        tag: kamer_gelijk_buiten_actueel
  - action: persistent_notification.dismiss
    data:
      notification_id: kamer_gelijk_buiten_actueel
  - action: notify.mobile_app_sm_g781b
    data:
      title: "{{ pijl }} Kamertemperatuur {{ actie_txt }}"
      message: "{{ reversal_msg }}"
      data:
        tag: kamer_reversal
        channel: "{{ 'Ventilatie advies (stil)' if stil_venster else 'Ventilatie advies' }}"
        importance: "{{ 'low' if stil_venster else 'high' }}"
        priority: "{{ 'normal' if stil_venster else 'high' }}"
        ttl: 0
        notification_icon: "{{ 'mdi:window-closed-variant' if is_stijgend else 'mdi:trending-down' }}"
  - action: persistent_notification.create
    data:
      title: "{{ pijl }} Kamertemperatuur {{ actie_txt }}"
      notification_id: kamer_reversal
      message: "{{ reversal_msg }}"
  mode: single
