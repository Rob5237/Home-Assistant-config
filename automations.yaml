            koel. Kamer {{ kamer_temp }}°C, buiten {{ buiten_actueel }}°C.
          data:
            tag: nachtventilatie
            channel: "{{ 'Ventilatie advies (stil)' if (stil_venster or gemeld) else 'Ventilatie advies' }}"
            importance: "{{ 'low' if (stil_venster or gemeld) else 'high' }}"
            priority: "{{ 'normal' if (stil_venster or gemeld) else 'high' }}"
            ttl: 0
            notification_icon: mdi:weather-night
      - action: persistent_notification.create
        data:
          title: "🌙 Nachtventilatie: zet ramen open"
          notification_id: nachtventilatie
          message: >-
            Zet ramen wagenwijd open voor het slapengaan; buitenlucht is
            koel. Kamer {{ kamer_temp }}°C, buiten {{ buiten_actueel }}°C.
      - action: notify.mobile_app_sm_g781b
        data:
          message: clear_notification
          data:
            tag: kamer_gelijk_buiten_actueel
      - action: persistent_notification.dismiss
        data:
          notification_id: kamer_gelijk_buiten_actueel
      - action: notify.mobile_app_sm_g781b
        data:
          message: clear_notification
          data:
            tag: kamer_te_koel_sluit_ramen
      - action: persistent_notification.dismiss
        data:
          notification_id: kamer_te_koel_sluit_ramen
      - action: notify.mobile_app_sm_g781b
        data:
          message: clear_notification
          data:
            tag: kamer_warm_buiten_warmer
      - action: persistent_notification.dismiss
        data:
          notification_id: kamer_warm_buiten_warmer
      - action: notify.mobile_app_sm_g781b
        data:
          message: clear_notification
          data:
            tag: kamer_reversal
      - action: persistent_notification.dismiss
        data:
          notification_id: kamer_reversal
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.nachtventilatie_signaal_actief
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ventileren_signaal_actief
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sluit_ramen_signaal_actief
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ramen_dicht_signaal_actief
    - conditions:
      - condition: template
        value_template: "{{ conditie and gemeld }}"
      sequence:
      - action: notify.mobile_app_sm_g781b
        data:
          title: "🌙 Nachtventilatie: zet ramen open"
          message: >-
            Zet ramen wagenwijd open voor het slapengaan; buitenlucht is
            koel. Kamer {{ kamer_temp }}°C, buiten {{ buiten_actueel }}°C.
          data:
            tag: nachtventilatie
