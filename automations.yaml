- id: nachtventilatie_signaal
  alias: "Signaal: nachtventilatie — kamer >20°C en buiten <18°C (22:30-06:00)"
  description: >
    Sterke pre-slaap wenk om ramen open te zetten wanneer 's avonds/nachts
    (22:30-06:00) de kamer nog >20°C is EN buiten al <18°C (koele nacht na
    warme dag). Vakantie-onderdrukking actief. Regen heeft voorrang (regen-
    guard in conditie). Meldingen 24/7 door, maar in het stil-venster
    22:30-07:30 gaat de push naar het aparte 'Ventilatie advies
    (stil)'-kanaal (geen wek-geluid). Edge-triggered via input_boolean.
    nachtventilatie_signaal_actief. Cross-clear naar de andere ventilatie-
    signalen bij activeren. Trigger: time_pattern /15 min. Reageert NIET
    op kamer_temp_reversal events — daar is kamer_reversal_melding
    leidend.
  triggers:
  - trigger: time_pattern
    minutes: "/15"
  actions:
  - variables:
      buiten_actueel: "{{ state_attr('weather.thuis', 'temperature') | float(-999) }}"
      kamer_temp: "{{ states('sensor.luxtronik_280807_0450_room_thermostat_temperature') | float(-999) }}"
      vakantie: "{{ is_state('input_boolean.vakantie_actief', 'on') }}"
      regen: "{{ states('weather.thuis') in ['rainy','pouring','lightning-rainy','snowy-rainy','hail'] }}"
      in_venster: "{{ (now().hour == 22 and now().minute >= 30) or now().hour >= 23 or now().hour < 6 }}"
      conditie: >-
        {{ kamer_temp > -900 and buiten_actueel > -900
           and kamer_temp > 20 and buiten_actueel < 18
           and in_venster and not vakantie and not regen }}
      gemeld: "{{ is_state('input_boolean.nachtventilatie_signaal_actief', 'on') }}"
      stil_venster: "{{ now().hour >= 23 or now().hour < 7 or (now().hour == 22 and now().minute >= 30) or (now().hour == 7 and now().minute < 30) }}"
