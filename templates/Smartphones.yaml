- sensor:
    - name: "Aantal Smartphones Thuis"
      unique_id: dynamic_smartphone_counter
      icon: mdi:cellphone-check
      unit_of_measurement: "telefoons"
      state: >
        {{ states.device_tracker
          | selectattr('attributes.source_type', 'defined')
          | selectattr('attributes.source_type', 'eq', 'gps')
          | selectattr('state', 'eq', 'home')
          | list | count
        }}
      attributes:
        namen: >
          {{ states.device_tracker
            | selectattr('attributes.source_type', 'defined')
            | selectattr('attributes.source_type', 'eq', 'gps')
            | selectattr('state', 'eq', 'home')
            | map(attribute='name') | list | join(', ')
          }}

    - name: "Smartphones op WiFi"
      unique_id: smartphones_on_wifi
      icon: mdi:wifi-cog
      unit_of_measurement: "telefoons"
      state: >
        {% set vendors = 'apple|samsung|google|xiaomi|huawei|oneplus|oppo|motorola|sm_' %}
        {{ states.device_tracker
           | selectattr('attributes.source_type', 'defined')
           | selectattr('state', 'eq', 'home')
           | selectattr('entity_id', 'match', '^device_tracker\\.(' ~ vendors ~ ')')
           | list | count }}
      attributes:
        namen: >
          {% set vendors = 'apple|samsung|google|xiaomi|huawei|oneplus|oppo|motorola|sm_' %}
          {{ states.device_tracker
             | selectattr('attributes.source_type', 'defined')
             | selectattr('state', 'eq', 'home')
             | selectattr('entity_id', 'match', '^device_tracker\\.(' ~ vendors ~ ')')
             | map(attribute='attributes.friendly_name') | list | join(', ') }}