# templates/elektriciteit_verbruik.yaml
# Historisch bevatte deze file 11 verbruiks-/kostensensoren; 10 daarvan
# bleken ongebruikt (nergens in dashboards, automations, of Energy-dashboard
# gerefereerd) en zijn verwijderd. Wat resteert is alleen export_365dagen
# — door ui-lovelace.yaml gebruikt voor het terugkijk-overzicht.
- sensor:
  - name: "Export laatste 365 dagen"
    unique_id: "export_365dagen"
    unit_of_measurement: "kWh"
    state: "{{ state_attr('sensor.solar_yearly', 'last_period') | float(0) }}"
