- sensor:
    - name: "CPU gebruik"
      unique_id: system_monitor_cpu
      unit_of_measurement: "%"
      state: "{{ states('sensor.system_monitor_processor_use') }}"

    - name: "Geheugengebruik"
      unique_id: system_monitor_memory
      unit_of_measurement: "MiB"
      device_class: data_size
      state: "{{ states('sensor.system_monitor_memory_use') }}"

    - name: "Schijfgebruik"
      unique_id: system_monitor_disk_use
      unit_of_measurement: "GiB"
      device_class: data_size
      state: "{{ states('sensor.system_monitor_disk_use') }}"

    - name: "Vrije schijfruimte"
      unique_id: system_monitor_disk_free
      unit_of_measurement: "GiB"
      device_class: data_size
      state: "{{ states('sensor.system_monitor_disk_free') }}"

    - name: "Processortemperatuur"
      unique_id: system_monitor_temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ states('sensor.system_monitor_processortemperatuur') }}"
