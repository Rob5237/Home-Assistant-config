# templates/warmtepomp.yaml
- sensor:

  - name: "Warmtepomp COP Verwarming"
    unique_id: "warmtepomp_cop_verwarming"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Tapwater"
    unique_id: "warmtepomp_cop_tapwater"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:water-boiler
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Totaal"
    unique_id: "warmtepomp_cop_totaal"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump-outline
    state: >
      {% set warmte_v = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set warmte_t = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input_v = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% set input_t = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% set totaal_input = input_v + input_t %}
      {% if totaal_input > 0 %}
        {{ ((warmte_v + warmte_t) / totaal_input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Geschat"
    unique_id: "warmtepomp_cop_geschat"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% set t = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(none) %}
      {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(none) %}
      {% if t is not none and t_aanvoer is not none and (t_aanvoer - t) >= 10 %}
        {% set lift = t_aanvoer - t %}
        {{ [[1.5, 0.4 * (t_aanvoer + 273) / lift] | max, 6.0] | min | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}
      aanvoertemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(None) }}

- trigger:
    - platform: time_pattern
      hours: "/1"
    - platform: homeassistant
      event: start
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.thuis
      data:
        type: hourly
      response_variable: weer_forecast
  sensor:
    - name: "Warmtepomp Optimaal Startuur"
      unique_id: "warmtepomp_optimaal_startuur"
      icon: mdi:clock-start
      state: >
        {% set weer = weer_forecast['weather.thuis'].forecast %}
        {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
        {% if weer and prijzen %}
          {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(35) %}
          {% set ns = namespace(beste_uur=none, laagste_kosten=999) %}
          {% for p in prijzen %}
            {% set p_dt = as_datetime(p.datetime) | as_local %}
            {% if p_dt >= now() %}
              {% for w in weer %}
                {% set w_dt = as_datetime(w.datetime) | as_local %}
                {% if w_dt.date() == p_dt.date() and w_dt.hour == p_dt.hour %}
                  {% set t = w.temperature | float(10) %}
                  {% set lift = [1, t_aanvoer - t] | max %}
                  {% set cop = [[1.5, 0.4 * (t_aanvoer + 273) / lift] | max, 6.0] | min %}
                  {% set kosten = (p.electricity_price | float(3000000)) / 10000000 / cop %}
                  {% if kosten < ns.laagste_kosten %}
                    {% set ns.laagste_kosten = kosten %}
                    {% set ns.beste_uur = p_dt %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ ns.beste_uur.strftime('%H:%M') if ns.beste_uur else 'onbekend' }}
        {% else %}
          onbekend
        {% endif %}
      attributes:
        kosten_per_kwh_warmte: >
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(35) %}
            {% set ns = namespace(laagste_kosten=999) %}
            {% for p in prijzen %}
              {% set p_dt = as_datetime(p.datetime) | as_local %}
              {% if p_dt >= now() %}
                {% for w in weer %}
                  {% set w_dt = as_datetime(w.datetime) | as_local %}
                  {% if w_dt.date() == p_dt.date() and w_dt.hour == p_dt.hour %}
                    {% set t = w.temperature | float(10) %}
                    {% set lift = [1, t_aanvoer - t] | max %}
                    {% set cop = [[1.5, 0.4 * (t_aanvoer + 273) / lift] | max, 6.0] | min %}
                    {% set kosten = (p.electricity_price | float(3000000)) / 10000000 / cop %}
                    {% if kosten < ns.laagste_kosten %}
                      {% set ns.laagste_kosten = kosten %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endfor %}
            {{ ns.laagste_kosten | round(4) }}
          {% else %}
            {{ none }}
          {% endif %}
        tdi_dagen_geleden: >
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% if s in ('unknown', 'unavailable') %}
            999
          {% else %}
            {{ (now().date() - (as_datetime(s) | as_local).date()).days }}
          {% endif %}
        tdi_kandidaat_uur: >
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
          {% if prijzen %}
            {% set ns = namespace(eerste_dag=none) %}
            {% for p in prijzen %}
              {% set p_dt = as_datetime(p.datetime) | as_local %}
              {% if p_dt >= now() and 9 <= p_dt.hour < 16 and ns.eerste_dag is none %}
                {% if tdi_dagen + (p_dt.date() - now().date()).days >= 7 %}
                  {% set ns.eerste_dag = p_dt.strftime('%Y-%m-%d') %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.eerste_dag is not none %}
              {% set ns2 = namespace(kandidaat_dt=none, kandidaat_prijs=999) %}
              {% for p in prijzen %}
                {% set p_dt = as_datetime(p.datetime) | as_local %}
                {% if p_dt.strftime('%Y-%m-%d') == ns.eerste_dag and 9 <= p_dt.hour < 16 %}
                  {% if p.electricity_price < ns2.kandidaat_prijs %}
                    {% set ns2.kandidaat_prijs = p.electricity_price %}
                    {% set ns2.kandidaat_dt = p_dt %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns2.kandidaat_dt.strftime('%d-%m %H:%M') if ns2.kandidaat_dt else 'onbekend' }}
            {% else %}
              {{ 'buiten venster (nog ' ~ (7 - tdi_dagen) ~ ' dagen)' }}
            {% endif %}
          {% else %}
            onbekend
          {% endif %}
        uurlijks_overzicht: >
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(35) %}
            {% set s = states('input_datetime.tdi_laatste_start') %}
            {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
            {% set ns_tdi = namespace(eerste_dag=none) %}
            {% for p in prijzen %}
              {% set p_dt = as_datetime(p.datetime) | as_local %}
              {% if p_dt >= now() and 9 <= p_dt.hour < 16 and ns_tdi.eerste_dag is none %}
                {% if tdi_dagen + (p_dt.date() - now().date()).days >= 7 %}
                  {% set ns_tdi.eerste_dag = p_dt.strftime('%Y-%m-%d') %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set ns_tdi2 = namespace(kandidaat_uur=-1, kandidaat_dag='') %}
            {% if ns_tdi.eerste_dag is not none %}
              {% set ns_best = namespace(prijs=999) %}
              {% for p in prijzen %}
                {% set p_dt = as_datetime(p.datetime) | as_local %}
                {% if p_dt.strftime('%Y-%m-%d') == ns_tdi.eerste_dag and 9 <= p_dt.hour < 16 %}
                  {% if p.electricity_price < ns_best.prijs %}
                    {% set ns_best.prijs = p.electricity_price %}
                    {% set ns_tdi2.kandidaat_uur = p_dt.hour %}
                    {% set ns_tdi2.kandidaat_dag = p_dt.strftime('%Y-%m-%d') %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% set ns = namespace(uren=[]) %}
            {% for p in prijzen %}
              {% set p_dt = as_datetime(p.datetime) | as_local %}
              {% if p_dt >= now() %}
                {% for w in weer %}
                  {% set w_dt = as_datetime(w.datetime) | as_local %}
                  {% if w_dt.date() == p_dt.date() and w_dt.hour == p_dt.hour %}
                    {% set t = w.temperature | float(10) %}
                    {% set lift = [1, t_aanvoer - t] | max %}
                    {% set cop = [[1.5, 0.4 * (t_aanvoer + 273) / lift] | max, 6.0] | min %}
                    {% set kosten = (p.electricity_price | float(3000000)) / 10000000 / cop %}
                    {% set is_tdi = p_dt.strftime('%Y-%m-%d') == ns_tdi2.kandidaat_dag and p_dt.hour == ns_tdi2.kandidaat_uur %}
                    {% set ns.uren = ns.uren + [{'uur': p_dt.strftime('%d-%m %H:%M'), 'temp': t | round(1), 'aanvoer': t_aanvoer | round(1), 'cop': cop | round(2), 'prijs': (p.electricity_price / 10000000) | round(4), 'kosten_warmte': kosten | round(4), 'tdi_kandidaat': is_tdi}] %}
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endfor %}
            {{ ns.uren }}
          {% else %}
            {{ [] }}
          {% endif %}
