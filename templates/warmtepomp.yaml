# templates/warmtepomp.yaml
#
# COP-sensoren + optimaal_startuur. Stooklijn- en COP-formules zitten in
# custom_templates/warmtepomp_macros.jinja zodat ze niet 3x worden herhaald
# in dit bestand. Na wijziging van macros: aanroepen via
# `homeassistant.reload_custom_jinja` + `homeassistant.reload_templates`.
- sensor:

  - name: "Warmtepomp COP Verwarming"
    unique_id: "warmtepomp_cop_verwarming"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Tapwater"
    unique_id: "warmtepomp_cop_tapwater"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:water-boiler
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  # Daily/monthly DHW COP via utility_meter deltas (packages/energy_meters.yaml).
  # Guard input > 0.3 kWh voorkomt divergerende COP aan begin van de dag/maand
  # (baseline standby ~0.4 kWh/dag zonder warmte-output = 0/klein).
  - name: "Warmtepomp COP Tapwater Dag"
    unique_id: "warmtepomp_cop_tapwater_dag"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:water-boiler
    state: >
      {% set warmte = states('sensor.dhw_heat_dagelijks') | float(0) %}
      {% set input = states('sensor.dhw_input_dagelijks') | float(0) %}
      {% if input > 0.3 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      warmte_kwh: "{{ states('sensor.dhw_heat_dagelijks') | float(0) | round(2) }}"
      input_kwh: "{{ states('sensor.dhw_input_dagelijks') | float(0) | round(2) }}"

  - name: "Warmtepomp COP Tapwater Maand"
    unique_id: "warmtepomp_cop_tapwater_maand"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:water-boiler
    state: >
      {% set warmte = states('sensor.dhw_heat_maandelijks') | float(0) %}
      {% set input = states('sensor.dhw_input_maandelijks') | float(0) %}
      {% if input > 1.0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      warmte_kwh: "{{ states('sensor.dhw_heat_maandelijks') | float(0) | round(1) }}"
      input_kwh: "{{ states('sensor.dhw_input_maandelijks') | float(0) | round(1) }}"

  # Compressor cycli deze maand (sum van bestaande dag/nacht tellers).
  # Gebruik voor pendel-detectie en solar-shift KPI (nacht/dag ratio).
  - name: "Warmtepomp compressor-starts maand"
    unique_id: "warmtepomp_compressor_starts_maand"
    unit_of_measurement: "starts"
    state_class: measurement
    icon: mdi:counter
    state: >
      {{ (states('input_number.compressor_starts_dag') | int(0))
       + (states('input_number.compressor_starts_nacht') | int(0)) }}
    attributes:
      dag: "{{ states('input_number.compressor_starts_dag') | int(0) }}"
      nacht: "{{ states('input_number.compressor_starts_nacht') | int(0) }}"
      nacht_pct: >
        {% set d = states('input_number.compressor_starts_dag') | int(0) %}
        {% set n = states('input_number.compressor_starts_nacht') | int(0) %}
        {% if d + n > 0 %}{{ ((n / (d + n)) * 100) | round(0) }}{% else %}0{% endif %}

  - name: "Warmtepomp COP Totaal"
    unique_id: "warmtepomp_cop_totaal"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump-outline
    state: >
      {% set warmte_v = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set warmte_t = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input_v = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% set input_t = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% set totaal_input = input_v + input_t %}
      {% if totaal_input > 0 %}
        {{ ((warmte_v + warmte_t) / totaal_input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Geschat"
    unique_id: "warmtepomp_cop_geschat"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% from 'warmtepomp_macros.jinja' import cop %}
      {% set t = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(none) %}
      {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(none) %}
      {% if t is not none and t_aanvoer is not none and (t_aanvoer - t) >= 10 %}
        {{ cop(t_aanvoer, t) | float | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}
      aanvoertemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(None) }}

- trigger:
    - platform: time_pattern
      hours: "/1"
    - platform: homeassistant
      event: start
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.thuis
      data:
        type: hourly
      response_variable: weer_forecast
  sensor:
    - name: "Warmtepomp Optimaal Startuur"
      unique_id: "warmtepomp_optimaal_startuur"
      icon: mdi:clock-start
      state: >
        {% from 'warmtepomp_macros.jinja' import bereken_uren %}
        {% set weer = weer_forecast['weather.thuis'].forecast %}
        {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
        {% if weer and prijzen %}
          {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
          {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
          {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
          {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
          {% if uren %}
            {% set best = uren | min(attribute='kosten_warmte') %}
            {{ '%02d:00' | format(best.uur) }}
          {% else %}
            onbekend
          {% endif %}
        {% else %}
          onbekend
        {% endif %}
      attributes:
        kosten_per_kwh_warmte: >
          {% from 'warmtepomp_macros.jinja' import bereken_uren %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
            {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
            {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
            {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
            {% if uren %}
              {{ (uren | min(attribute='kosten_warmte')).kosten_warmte }}
            {% else %}
              {{ none }}
            {% endif %}
          {% else %}
            {{ none }}
          {% endif %}
        tdi_dagen_geleden: >
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% if s in ('unknown', 'unavailable') %}
            999
          {% else %}
            {{ (now().date() - (as_datetime(s) | as_local).date()).days }}
          {% endif %}
        tdi_kandidaat_uur: >
          {% from 'warmtepomp_macros.jinja' import bereken_tdi_uren %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
          {% if prijzen and weer %}
            {% set tdi_uren = bereken_tdi_uren(prijzen, weer, tdi_dagen) | from_json %}
            {% if tdi_uren %}
              {{ (tdi_uren | min(attribute='kosten_warmte')).label }}
            {% else %}
              {{ 'buiten venster (nog ' ~ (7 - tdi_dagen) ~ ' dagen)' }}
            {% endif %}
          {% else %}
            onbekend
          {% endif %}
        uurlijks_overzicht: >
          {% from 'warmtepomp_macros.jinja' import bereken_uren, bereken_tdi_uren %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
            {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
            {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
            {% set s = states('input_datetime.tdi_laatste_start') %}
            {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
            {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
            {% set tdi_uren = bereken_tdi_uren(prijzen, weer, tdi_dagen) | from_json %}
            {% set tdi_best = (tdi_uren | min(attribute='kosten_warmte')) if tdi_uren else none %}
            {% set tdi_dag = tdi_best.dag if tdi_best else '' %}
            {% set tdi_uur = tdi_best.uur if tdi_best else -1 %}
            {% set ns = namespace(uren=[]) %}
            {% for u in uren %}
              {% set ns.uren = ns.uren + [{
                'uur': u.label,
                'temp': u.temp,
                'aanvoer': u.aanvoer,
                'cop': u.cop_geschat,
                'prijs': u.prijs,
                'kosten_warmte': u.kosten_warmte,
                'tdi_kandidaat': u.dag == tdi_dag and u.uur == tdi_uur
              }] %}
            {% endfor %}
            {{ ns.uren }}
          {% else %}
            {{ [] }}
          {% endif %}

# DHW delta-T bij compressor-start: 57 - DHW-temp op moment van compressor
# off→on. Hoge waarde (>10K) = diepe ontlading vóór start = lange cyclus in
# koude tank = mindere gemiddelde COP. Streefwaarde na drempel-verhoging
# 47→52 in klein-overschot: 5-10K.
# Trigger-based template: alleen ge-update bij DHW-cyclusstart (dhw_target>55).
# In winter met heating cycli (dhw_target blijft 50) blijft de sensor stabiel
# tot volgende echte DHW-cyclus. Restore state overleeft HA-restart.
- trigger:
  - platform: state
    entity_id: binary_sensor.luxtronik_280807_0450_compressor
    from: "off"
    to: "on"
  condition:
  - condition: numeric_state
    entity_id: number.luxtronik_280807_0450_dhw_target_temperature
    above: 55
  sensor:
  - name: "DHW delta-T bij compressor-start"
    unique_id: dhw_delta_t_bij_compressor_start
    unit_of_measurement: "K"
    state_class: measurement
    icon: mdi:delta
    state: >
      {% set target = states('number.luxtronik_280807_0450_dhw_target_temperature') | float(57) %}
      {% set dhw = states('sensor.luxtronik_280807_0450_dhw_temperature') | float(57) %}
      {{ (target - dhw) | round(1) }}
    attributes:
      dhw_bij_start: "{{ states('sensor.luxtronik_280807_0450_dhw_temperature') | float(0) | round(1) }}"
      setpoint_bij_start: "{{ states('number.luxtronik_280807_0450_dhw_target_temperature') | float(0) | round(1) }}"
      dhw_mode: "{{ states('select.luxtronik_280807_0450_dhw_mode') }}"
      buiten: "{{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(0) | round(1) }}"
      tijd: "{{ now().strftime('%Y-%m-%d %H:%M') }}"

# DHW-cycli vandaag: telt off→on transities met dhw_target > 55 (= DHW-boost
# actief, niet heating). Reset dagelijks om 00:00. Als er tijdens een cyclus
# HA herstart, blijft de teller-waarde behouden (trigger-based sensors
# restoren state).
- trigger:
  - id: cyclus_start
    platform: state
    entity_id: binary_sensor.luxtronik_280807_0450_compressor
    from: "off"
    to: "on"
  - id: dagreset
    platform: time
    at: "00:00:00"
  condition:
  - condition: or
    conditions:
    - condition: trigger
      id: dagreset
    - condition: and
      conditions:
      - condition: trigger
        id: cyclus_start
      - condition: numeric_state
        entity_id: number.luxtronik_280807_0450_dhw_target_temperature
        above: 55
  sensor:
  - name: "DHW cycli vandaag"
    unique_id: dhw_cycli_vandaag
    unit_of_measurement: "cycli"
    state_class: measurement
    icon: mdi:counter
    state: >
      {% if trigger.id == 'dagreset' %}
        0
      {% else %}
        {{ (this.state | int(0)) + 1 }}
      {% endif %}
