# templates/warmtepomp.yaml
#
# COP-sensoren + optimaal_startuur. Stooklijn- en COP-formules zitten in
# custom_templates/warmtepomp_macros.jinja zodat ze niet 3x worden herhaald
# in dit bestand. Na wijziging van macros: aanroepen via
# `homeassistant.reload_custom_jinja` + `homeassistant.reload_templates`.
- sensor:

  - name: "Warmtepomp COP Verwarming"
    unique_id: "warmtepomp_cop_verwarming"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Tapwater"
    unique_id: "warmtepomp_cop_tapwater"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:water-boiler
    state: >
      {% set warmte = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% if input > 0 %}
        {{ (warmte / input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Totaal"
    unique_id: "warmtepomp_cop_totaal"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump-outline
    state: >
      {% set warmte_v = states('sensor.luxtronik_280807_0450_heat_amount_heating') | float(0) %}
      {% set warmte_t = states('sensor.luxtronik_280807_0450_dhw_heat_amount') | float(0) %}
      {% set input_v = states('sensor.luxtronik_280807_0450_heat_energy_input') | float(0) %}
      {% set input_t = states('sensor.luxtronik_280807_0450_dhw_energy_input') | float(0) %}
      {% set totaal_input = input_v + input_t %}
      {% if totaal_input > 0 %}
        {{ ((warmte_v + warmte_t) / totaal_input) | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}

  - name: "Warmtepomp COP Geschat"
    unique_id: "warmtepomp_cop_geschat"
    unit_of_measurement: ""
    state_class: measurement
    icon: mdi:heat-pump
    state: >
      {% from 'warmtepomp_macros.jinja' import cop %}
      {% set t = states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(none) %}
      {% set t_aanvoer = states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(none) %}
      {% if t is not none and t_aanvoer is not none and (t_aanvoer - t) >= 10 %}
        {{ cop(t_aanvoer, t) | float | round(2) }}
      {% else %}
        {{ 'unavailable' }}
      {% endif %}
    attributes:
      buitentemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_outdoor_temperature') | float(None) }}
      aanvoertemperatuur: >
        {{ states('sensor.luxtronik_280807_0450_flow_in_temperature') | float(None) }}

- trigger:
    - platform: time_pattern
      hours: "/1"
    - platform: homeassistant
      event: start
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.thuis
      data:
        type: hourly
      response_variable: weer_forecast
  sensor:
    - name: "Warmtepomp Optimaal Startuur"
      unique_id: "warmtepomp_optimaal_startuur"
      icon: mdi:clock-start
      state: >
        {% from 'warmtepomp_macros.jinja' import bereken_uren %}
        {% set weer = weer_forecast['weather.thuis'].forecast %}
        {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
        {% if weer and prijzen %}
          {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
          {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
          {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
          {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
          {% if uren %}
            {% set best = uren | min(attribute='kosten_warmte') %}
            {{ '%02d:00' | format(best.uur) }}
          {% else %}
            onbekend
          {% endif %}
        {% else %}
          onbekend
        {% endif %}
      attributes:
        kosten_per_kwh_warmte: >
          {% from 'warmtepomp_macros.jinja' import bereken_uren %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
            {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
            {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
            {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
            {% if uren %}
              {{ (uren | min(attribute='kosten_warmte')).kosten_warmte }}
            {% else %}
              {{ none }}
            {% endif %}
          {% else %}
            {{ none }}
          {% endif %}
        tdi_dagen_geleden: >
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% if s in ('unknown', 'unavailable') %}
            999
          {% else %}
            {{ (now().date() - (as_datetime(s) | as_local).date()).days }}
          {% endif %}
        tdi_kandidaat_uur: >
          {% from 'warmtepomp_macros.jinja' import bereken_tdi_uren %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set s = states('input_datetime.tdi_laatste_start') %}
          {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
          {% if prijzen and weer %}
            {% set tdi_uren = bereken_tdi_uren(prijzen, weer, tdi_dagen) | from_json %}
            {% if tdi_uren %}
              {{ (tdi_uren | min(attribute='kosten_warmte')).label }}
            {% else %}
              {{ 'buiten venster (nog ' ~ (7 - tdi_dagen) ~ ' dagen)' }}
            {% endif %}
          {% else %}
            onbekend
          {% endif %}
        uurlijks_overzicht: >
          {% from 'warmtepomp_macros.jinja' import bereken_uren, bereken_tdi_uren %}
          {% set weer = weer_forecast['weather.thuis'].forecast %}
          {% set prijzen = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% if weer and prijzen %}
            {% set t_min = states('number.luxtronik_280807_0450_heating_min_flow_out_temperature') | float(19) %}
            {% set t_max = states('number.luxtronik_280807_0450_heating_curve_end_temperature') | float(35) %}
            {% set t_drempel = states('number.luxtronik_280807_0450_heating_threshold_temperature') | float(14) %}
            {% set s = states('input_datetime.tdi_laatste_start') %}
            {% set tdi_dagen = (now().date() - (as_datetime(s) | as_local).date()).days if s not in ('unknown', 'unavailable') else 999 %}
            {% set uren = bereken_uren(prijzen, weer, t_min, t_max, t_drempel) | from_json %}
            {% set tdi_uren = bereken_tdi_uren(prijzen, weer, tdi_dagen) | from_json %}
            {% set tdi_best = (tdi_uren | min(attribute='kosten_warmte')) if tdi_uren else none %}
            {% set tdi_dag = tdi_best.dag if tdi_best else '' %}
            {% set tdi_uur = tdi_best.uur if tdi_best else -1 %}
            {% set ns = namespace(uren=[]) %}
            {% for u in uren %}
              {% set ns.uren = ns.uren + [{
                'uur': u.label,
                'temp': u.temp,
                'aanvoer': u.aanvoer,
                'cop': u.cop_geschat,
                'prijs': u.prijs,
                'kosten_warmte': u.kosten_warmte,
                'tdi_kandidaat': u.dag == tdi_dag and u.uur == tdi_uur
              }] %}
            {% endfor %}
            {{ ns.uren }}
          {% else %}
            {{ [] }}
          {% endif %}
