command_line:
  - sensor:
      name: "Luxtronik Data"
      unique_id: luxtronik_data
      command: >
        python3 -c "
        import socket, struct, json
        sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        sock.settimeout(10)
        sock.connect(('192.168.1.39', 8889))
        sock.send(struct.pack('>i', 3004) + struct.pack('>i', 0))
        sock.recv(4); sock.recv(4)
        count = struct.unpack('>i', sock.recv(4))[0]
        params = []
        for i in range(count):
            params.append(struct.unpack('>i', sock.recv(4))[0])
        sock.close()
        print(json.dumps({
            'aanvoer': params[10]/10,
            'retour': params[11]/10,
            'retour_berekend': params[12]/10,
            'buiten': params[15]/10,
            'buiten_gemiddeld': params[16]/10,
            'tapwater_gemeten': params[17]/10,
            'tapwater_ingesteld': params[18]/10,
            'dekking_wp': params[21]/10,
            'bedrijfsuren_wp': round(params[56]/3600),
            'bedrijfsuren_verw': round(params[64]/3600),
            'bedrijfsuren_tw': round(params[65]/3600),
            'impulsen_vd1': params[57]
        }))
        "
      scan_interval: 60
      value_template: "OK"
      json_attributes:
        - aanvoer
        - retour
        - retour_berekend
        - buiten
        - buiten_gemiddeld
        - tapwater_gemeten
        - tapwater_ingesteld
        - dekking_wp
        - bedrijfsuren_wp
        - bedrijfsuren_verw
        - bedrijfsuren_tw
        - impulsen_vd1

template:
  - sensor:
      - name: "Luxtronik Aanvoertemperatuur"
        unique_id: luxtronik_aanvoer
        state: "{{ state_attr('sensor.luxtronik_data', 'aanvoer') }}"
        unit_of_measurement: "°C"
        device_class: temperature
      - name: "Luxtronik Retourtemperatuur"
