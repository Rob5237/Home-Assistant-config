# utility_meter definities voor Energie & Solar
# Bron: P1-meter (DSMR)
#   export → sensor.p1_meter_energy_export
#   import → sensor.p1_meter_energy_import

utility_meter:
  # SOLAR/EXPORT METERS
  solar_daily:
    source: sensor.p1_meter_energy_export
    cycle: daily

  solar_monthly:
    source: sensor.p1_meter_energy_export
    cycle: monthly

  solar_yearly:
    source: sensor.p1_meter_energy_export
    cycle: yearly

  # ENERGY/IMPORT METERS
  energy_daily:
    source: sensor.p1_meter_energy_import
    cycle: daily

  energy_monthly:
    source: sensor.p1_meter_energy_import
    cycle: monthly

  energy_yearly:
    source: sensor.p1_meter_energy_import
    cycle: yearly