# utility_meter definities voor Energie & Solar
# Bron: P1-meter (DSMR)
#
# Naamgeving van de P1-meter entiteiten is historisch een mix (NL/EN):
#   - import-kant      → sensor.p1_meter_energy_import        (EN, integration default)
#   - export-kant      → sensor.p1_meter_energie_export       (NL, ooit handmatig hernoemd)
#   - import_tariff_*  → sensor.p1_meter_energy_import_tariff_1/2 (EN)
#   - export tariff 1  → sensor.p1_meter_energie_export_tarief_1  (NL, hernoemd)
#   - export tariff 2  → sensor.p1_meter_energy_export_tariff_2   (EN)
# Beide vormen bestaan dus echt in de entity_registry; dit is geen typo.
# Bij een toekomstige opschoning: hernoem _energie_export(_tarief_1) terug naar
# _energy_export(_tariff_1) via Developer Tools → Entities en pas de sources
# hieronder aan. Statistics-history moet daarna overgezet via Developer Tools
# → Statistics (fix issues), anders breekt het Energy-dashboard.

utility_meter:
  # EXPORT/TERUGLEVERING METERS (P1 export naar net)
  # Let op: naam 'solar_*' is historisch — meet teruglevering, niet bruto productie.
  solar_daily:
    source: sensor.p1_meter_energie_export
    cycle: daily

  solar_monthly:
    source: sensor.p1_meter_energie_export
    cycle: monthly

  solar_yearly:
    source: sensor.p1_meter_energie_export
    cycle: yearly

  # IMPORT METERS (P1 afname van net)
  energy_daily:
    source: sensor.p1_meter_energy_import
    cycle: daily

  energy_monthly:
    source: sensor.p1_meter_energy_import
    cycle: monthly

  energy_yearly:
    source: sensor.p1_meter_energy_import
    cycle: yearly

  # ENPHASE PRODUCTIE METERS (bruto zonneopwekking van Envoy)
  enphase_daily:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: daily

  enphase_monthly:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: monthly

  enphase_yearly:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: yearly

  # WARMTEPOMP DHW METERS (bruto warmte + elektrisch input voor COP-tracking)
  # dhw_heat_amount = geproduceerde warmte in tapwater (thermisch, kWh)
  # dhw_energy_input = verbruikte elektriciteit voor tapwater (elektrisch, kWh)
  # COP = dhw_heat_amount / dhw_energy_input, berekend in templates/warmtepomp.yaml
  dhw_heat_dagelijks:
    source: sensor.luxtronik_280807_0450_dhw_heat_amount
    cycle: daily

  dhw_heat_maandelijks:
    source: sensor.luxtronik_280807_0450_dhw_heat_amount
    cycle: monthly

  dhw_input_dagelijks:
    source: sensor.luxtronik_280807_0450_dhw_energy_input
    cycle: daily

  dhw_input_maandelijks:
    source: sensor.luxtronik_280807_0450_dhw_energy_input
    cycle: monthly