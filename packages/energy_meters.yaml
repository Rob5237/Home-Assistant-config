# utility_meter definities voor Energie & Solar
# Bron: P1-meter (DSMR)
#   export → sensor.p1_meter_energy_export
#   import → sensor.p1_meter_energy_import

utility_meter:
  # EXPORT/TERUGLEVERING METERS (P1 export naar net)
  # Let op: naam 'solar_*' is historisch — meet teruglevering, niet bruto productie.
  # Bron heet 'energie' (NL), niet 'energy' — de _energy_export entity bestaat niet.
  solar_daily:
    source: sensor.p1_meter_energie_export
    cycle: daily

  solar_monthly:
    source: sensor.p1_meter_energie_export
    cycle: monthly

  solar_yearly:
    source: sensor.p1_meter_energie_export
    cycle: yearly

  # IMPORT METERS (P1 afname van net)
  energy_daily:
    source: sensor.p1_meter_energy_import
    cycle: daily

  energy_monthly:
    source: sensor.p1_meter_energy_import
    cycle: monthly

  energy_yearly:
    source: sensor.p1_meter_energy_import
    cycle: yearly

  # ENPHASE PRODUCTIE METERS (bruto zonneopwekking van Envoy)
  enphase_daily:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: daily

  enphase_monthly:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: monthly

  enphase_yearly:
    source: sensor.envoy_122331077486_lifetime_energy_production
    cycle: yearly