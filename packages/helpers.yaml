# ⚙️ helpers voor dashboard & automatiseringen
input_number:
  tapwater_tarief_drempel:
    name: "Tapwater max. tarief bijverwarmen (€/kWh)"
    initial: 0.25
    min: 0.00
    max: 1.00
    step: 0.01
    unit_of_measurement: "€/kWh"
    icon: mdi:thermometer-water

  verbruiksprijs_kwh:
    name: "Verbruiksprijs elektriciteit (€/kWh)"
    initial: 0.2554
    min: 0
    max: 2
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur

  zon_forecast_drempel_kwh:
    name: "Zon-forecast drempel voor zonne-overschot opwarmen (kWh/uur)"
    initial: 2.0
    min: 0
    max: 10
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:weather-sunny

  vakantie_parallel_shift_backup:
    name: "Backup parallel_shift voor vakantie (0 = geen backup)"
    initial: 0
    min: 0
    max: 30
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:content-save-cog

input_boolean:
  vakantie_actief:
    name: "Vakantiemodus actief"
    icon: mdi:airplane

  tapwater_overschot_lock:
    name: "Tapwater opwarm-cyclus actief (reset-lock)"
    icon: mdi:lock-clock

  douche_piek_actief:
    name: "Douche-piek periode actief"
    icon: mdi:shower-head

input_datetime:
  tdi_laatste_start:
    name: "TDI laatste start"
    has_date: true
    has_time: true
    icon: mdi:water-boiler

  last_github_backup:
    name: "Laatste GitHub backup poging"
    has_date: true
    has_time: true
    icon: mdi:cloud-upload

  douche_piek_start:
    name: "Douche-piek start"
    has_date: true
    has_time: true
    icon: mdi:calendar-start

  douche_piek_eind:
    name: "Douche-piek eind"
    has_date: true
    has_time: true
    icon: mdi:calendar-end

