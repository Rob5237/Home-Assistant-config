# ⚙️ helpers voor dashboard & automatiseringen
input_number:
  tapwater_tarief_drempel:
    name: "Tapwater max. tarief bijverwarmen (€/kWh)"
    initial: 0.25
    min: 0.00
    max: 1.00
    step: 0.01
    unit_of_measurement: "€/kWh"
    icon: mdi:thermometer-water

  zon_forecast_drempel_kwh:
    name: "Zon-forecast drempel voor zonne-overschot opwarmen (kWh/uur)"
    initial: 2.0
    min: 0
    max: 10
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:weather-sunny

  vakantie_parallel_shift_backup:
    name: "Backup parallel_shift voor vakantie (0 = geen backup)"
    initial: 0
    min: 0
    max: 30
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:content-save-cog

  compressor_starts_dag:
    name: "Compressor-starts overdag (06:00-22:00)"
    initial: 0
    min: 0
    max: 99999
    step: 1
    icon: mdi:counter

  compressor_starts_nacht:
    name: "Compressor-starts 's nachts (22:00-06:00)"
    initial: 0
    min: 0
    max: 99999
    step: 1
    icon: mdi:counter

  kamer_ref_temp:
    name: "Kamer temp referentie (peak/trough)"
    min: -30
    max: 60
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-lines

input_boolean:
  vakantie_actief:
    name: "Vakantiemodus actief"
    icon: mdi:airplane

  tapwater_overschot_lock:
    name: "Tapwater opwarm-cyclus actief (reset-lock)"
    icon: mdi:lock-clock

  ventileren_signaal_actief:
    name: "Ventileren-signaal reeds verstuurd"
    icon: mdi:bell-check

  sluit_ramen_signaal_actief:
    name: "Sluit-ramen-signaal reeds verstuurd"
    icon: mdi:bell-check

  ramen_dicht_signaal_actief:
    name: "Ramen-dicht-signaal reeds verstuurd"
    icon: mdi:bell-check

  regen_signaal_actief:
    name: "Regen-signaal reeds verstuurd"
    icon: mdi:bell-check

  nachtventilatie_signaal_actief:
    name: "Nachtventilatie-signaal reeds verstuurd"
    icon: mdi:bell-check

  kamer_stijgt:
    name: "Kamer temp trend: stijgend"
    icon: mdi:trending-up

input_datetime:
  tdi_laatste_start:
    name: "TDI laatste start"
    has_date: true
    has_time: true
    icon: mdi:water-boiler

  last_github_backup:
    name: "Laatste GitHub backup poging"
    has_date: true
    has_time: true
    icon: mdi:cloud-upload
