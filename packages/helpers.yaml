# ⚙️ helpers voor dashboard & automatiseringen
input_number:
  tapwater_tarief_drempel:
    name: "Tapwater max. tarief bijverwarmen (€/kWh)"
    initial: 0.25
    min: 0.00
    max: 1.00
    step: 0.01
    unit_of_measurement: "€/kWh"
    icon: mdi:thermometer-water

  verbruiksprijs_kwh:
    name: "Verbruiksprijs elektriciteit (€/kWh)"
    initial: 0.2554
    min: 0
    max: 2
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur

  terugleverprijs_kwh:
    name: "Terugleverprijs elektriciteit (€/kWh)"
    initial: 0.09
    min: 0
    max: 2
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur

input_boolean:
  vakantie_actief:
    name: "Vakantiemodus actief"
    icon: mdi:airplane

input_datetime:
  tdi_laatste_start:
    name: "TDI laatste start"
    has_date: true
    has_time: true
    icon: mdi:water-boiler

  last_github_backup:
    name: "Laatste GitHub backup poging"
    has_date: true
    has_time: true
    icon: mdi:cloud-upload

