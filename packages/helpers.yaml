# ⚙️ helpers voor dashboard & automatiseringen
input_boolean:
  ficus_watered:
    name: "Ficus water gegeven"
    initial: false
  monstera_watered:
    name: "Monstera water gegeven"
    initial: false

input_select:
  ficus_location:
    name: "Ficus werkelijke locatie"
    options:
      - Noord
      - Oost
      - Zuid
      - West
      - Geen direct zonlicht
    initial: "Zuid"
  monstera_location:
    name: "Monstera werkelijke locatie"
    options:
      - Noord
      - Oost
      - Zuid
      - West
      - Geen direct zonlicht
    initial: "West"

input_number:
  tapwater_tarief_drempel:
    name: "Tapwater max. tarief bijverwarmen (€/kWh)"
    initial: 0.25
    min: 0.00
    max: 1.00
    step: 0.01
    unit_of_measurement: "€/kWh"
    icon: mdi:thermometer-water

  verbruiksprijs_kwh:
    name: "Verbruiksprijs elektriciteit (€/kWh)"
    initial: 0.2554
    min: 0
    max: 2
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur

  terugleverprijs_kwh:
    name: "Terugleverprijs elektriciteit (€/kWh)"
    initial: 0.09
    min: 0
    max: 2
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur

  ficus_height:
    name: "Ficus hoogte (cm)"
    initial: 120
    min: 10
    max: 300
    step: 1
  ficus_pot_diameter:
    name: "Ficus potdiameter (cm)"
    initial: 25
    min: 5
    max: 100
    step: 1
  monstera_height:
    name: "Monstera hoogte (cm)"
    initial: 90
    min: 10
    max: 300
    step: 1
  monstera_pot_diameter:
    name: "Monstera potdiameter (cm)"
    initial: 20
    min: 5
    max: 100
    step: 1
