compact_sidebar:
  # Algemene kleuren (optioneel, kun je aanpassen)
  primary-color: "#2196f3"
  accent-color: "#ff9800"
  background-color: "#f5f5f5"
  text-primary-color: "#000000"
  text-dark-color: "#333333"

  # Sidebar instellingen
  sidebar-background-color: "#ffffff"
  sidebar-text-color: "#000000"
  sidebar-icon-color: "#000000"
  sidebar-selected-background-color: "#dddddd"
  sidebar-selected-icon-color: "#2196f3"
  sidebar-selected-text-color: "#2196f3"

  # Compacte regelafstand
  sidebar-item-padding: "2px 5px"   # verkleint de ruimte tussen menu-items
  sidebar-width: "200px"            # optioneel, kleiner maakt meer items zichtbaar
